<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="gM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="35%" stop-color="#d4a017"/>
      <stop offset="70%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="gT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="iS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#d4a017" flood-opacity="0.25"/>
    </filter>
    <clipPath id="ic"><rect x="24" y="24" width="152" height="152" rx="36"/></clipPath>
  </defs>
  
  <!-- Fond -->
  <rect width="800" height="200" fill="#06090e"/>
  
  <!-- Icône -->
  <g filter="url(#sh)">
    <rect x="24" y="24" width="152" height="152" rx="36" fill="url(#gM)"/>
  </g>
  <g clip-path="url(#ic)">
    <ellipse cx="100" cy="24" rx="90" ry="60" fill="url(#iS)"/>
  </g>
  <rect x="27" y="27" width="146" height="146" rx="34" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.8"/>
  <text x="100" y="118" text-anchor="middle" font-family="'DM Sans',sans-serif" font-weight="800" font-size="82" fill="#0a0800" letter-spacing="-3">Au</text>
  <circle cx="155" cy="55" r="2.5" fill="#fff4c8" opacity="0.5"/>
  
  <!-- Wordmark -->
  <text x="210" y="126" font-family="'DM Sans',sans-serif" font-weight="800" font-size="72" fill="url(#gT)" letter-spacing="3">AURUM</text>
  
  <!-- Tagline -->
  <text x="213" y="156" font-family="'DM Sans',sans-serif" font-weight="600" font-size="14" fill="#6b7ea0" letter-spacing="4">TRADING ECOSYSTEM</text>
  
  <!-- Ligne décorative -->
  <line x1="213" y1="135" x2="350" y2="135" stroke="#d4a017" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
