<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gold gradient pour le texte Au -->
    <linearGradient id="auGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7e08a"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Gradient pour la ligne -->
    <linearGradient id="lineGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4a017" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow radial -->
    <radialGradient id="glow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" fill="#06090e"/>

  <!-- Glow radial pulsant -->
  <circle cx="256" cy="220" r="180" fill="url(#glow)">
    <animate attributeName="r" values="170;190;170" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".8;1;.8" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- 3 cercles concentriques subtils -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#d4a017" stroke-width="1" opacity=".08"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#d4a017" stroke-width="1" opacity=".04"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#d4a017" stroke-width="1" opacity=".02"/>

  <!-- Coins en L dorés -->
  <!-- Top-left -->
  <path d="M60 80 L60 60 L80 60" fill="none" stroke="#d4a017" stroke-width="1.5" opacity=".1" stroke-linecap="round"/>
  <!-- Top-right -->
  <path d="M432 60 L452 60 L452 80" fill="none" stroke="#d4a017" stroke-width="1.5" opacity=".1" stroke-linecap="round"/>
  <!-- Bottom-left -->
  <path d="M60 432 L60 452 L80 452" fill="none" stroke="#d4a017" stroke-width="1.5" opacity=".1" stroke-linecap="round"/>
  <!-- Bottom-right -->
  <path d="M432 452 L452 452 L452 432" fill="none" stroke="#d4a017" stroke-width="1.5" opacity=".1" stroke-linecap="round"/>

  <!-- "Au" principal - 96px -->
  <text x="256" y="245" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="800" font-size="96" fill="url(#auGold)">Au</text>

  <!-- Ligne fine dorée -->
  <line x1="236" y1="270" x2="276" y2="270" stroke="url(#lineGold)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- "AURUM" en dessous -->
  <text x="256" y="300" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="600" font-size="13" fill="#d4a017" opacity=".4" letter-spacing="8">AURUM</text>
</svg>
