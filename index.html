<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Aurum — Trading & Patrimoine</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4a017">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aurum">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <meta name="description" content="Aurum — Écosystème Trading XAUUSD & Patrimoine">
  <meta property="og:title" content="Aurum — Trading & Patrimoine">
  <meta property="og:description" content="Écosystème complet pour trader le XAUUSD et construire ton patrimoine">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       AURUM PWA SHELL — Variables & Reset
       ============================================ */
    :root {
      --bg: #06090e;
      --bg2: #0c1018;
      --bg3: #141a26;
      --bg4: #1b2232;
      --border: #1d2840;
      --border2: #293756;
      --gold: #d4a017;
      --gold2: #b8860b;
      --gold3: #f5d060;
      --green: #00d68f;
      --red: #ff4757;
      --blue: #5b8def;
      --purple: #a78bfa;
      --t1: #edf2f7;
      --t2: #9bafd4;
      --t3: #6b7ea0;
      --radius: 12px;
      --transition: .25s cubic-bezier(.4, 0, .2, 1);
      --nav-h: 64px;
      --side-w: 72px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       LAYOUT PRINCIPAL
       ============================================ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    /* ============================================
       HEADER TOP BAR (mobile & desktop)
       ============================================ */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding: 0 16px;
      background: linear-gradient(180deg, rgba(12,16,24,.95) 0%, rgba(12,16,24,.85) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 100;
    }

    .top-bar .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--t1);
    }

    .top-bar .logo svg {
      width: 28px;
      height: 28px;
    }

    .top-bar .logo span {
      font-weight: 800;
      font-size: 18px;
      background: linear-gradient(135deg, var(--gold3), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .5px;
    }

    .top-bar .page-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--t2);
      opacity: 0;
      transform: translateY(-4px);
      transition: all .3s ease;
    }

    .top-bar .page-title.vis {
      opacity: 1;
      transform: translateY(0);
    }

    .top-bar .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--t3);
    }

    .top-bar .status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s infinite;
    }

    .top-bar .status.offline .dot {
      background: var(--red);
      animation: none;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }

    /* ============================================
       ZONE CONTENU (iframes)
       ============================================ */
    .content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .page-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
      opacity: 0;
      transform: translateX(40px) scale(.98);
      transition: opacity .35s cubic-bezier(.4,0,.2,1), transform .35s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      z-index: 1;
    }

    .page-frame.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
      z-index: 10;
    }

    .page-frame.exit-left {
      opacity: 0;
      transform: translateX(-40px) scale(.98);
      pointer-events: none;
      z-index: 5;
    }

    .page-frame.exit-right {
      opacity: 0;
      transform: translateX(40px) scale(.98);
      pointer-events: none;
      z-index: 5;
    }

    /* Loading skeleton */
    .page-loader {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 20;
      transition: opacity .3s ease;
    }

    .page-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid rgba(29,40,64,.5);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .loader-text {
      font-size: 12px;
      color: var(--t3);
      font-weight: 500;
      letter-spacing: .5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ============================================
       NAVIGATION BOTTOM BAR (mobile)
       ============================================ */
    /* ─── Logo Home button ─── */
    .nav-home {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      padding: 4px;
      border-radius: 12px;
      position: relative;
    }
    .nav-home:hover {
      transform: scale(1.08);
    }
    .nav-home:active {
      transform: scale(.92);
    }
    .nav-home svg {
      filter: drop-shadow(0 0 8px rgba(212,160,23,.2));
      transition: filter .3s;
    }
    .nav-home:hover svg {
      filter: drop-shadow(0 0 16px rgba(212,160,23,.4));
    }

    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      height: var(--nav-h);
      background: rgba(12,16,24,.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(212,160,23,.08);
      flex-shrink: 0;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all var(--transition);
      position: relative;
      -webkit-tap-highlight-color: transparent;
      min-width: 60px;
    }

    .nav-item .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .nav-item .nav-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: var(--t3);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all var(--transition);
    }

    .nav-item .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--t3);
      transition: all var(--transition);
      letter-spacing: .3px;
    }

    /* Active state */
    .nav-item.active .nav-icon svg {
      stroke: var(--gold);
      filter: drop-shadow(0 0 6px rgba(212, 160, 23, .4));
    }

    .nav-item.active .nav-label {
      color: var(--gold);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      border-radius: 0 0 3px 3px;
      background: var(--gold);
      box-shadow: 0 0 8px currentColor;
      animation: nav-indicator .3s ease;
    }

    @keyframes nav-indicator {
      from { width: 0; opacity: 0; }
      to { width: 24px; opacity: 1; }
    }

    /* Hover (desktop) */
    .nav-item:hover .nav-icon svg {
      stroke: var(--t1);
    }

    .nav-item:hover .nav-label {
      color: var(--t1);
    }

    /* Ripple effect on tap */
    .nav-item:active {
      transform: scale(.92);
    }

    .nav-item::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(212,160,23,.1);
      border-radius: 50%;
      transform: translate(-50%,-50%);
      transition: width .3s, height .3s, opacity .3s;
      opacity: 0;
    }
    .nav-item:active::after {
      width: 60px;
      height: 60px;
      opacity: 1;
    }

    /* Color coding per section */
    .nav-item[data-page="hub"].active .nav-icon svg { stroke: var(--gold); }
    .nav-item[data-page="hub"].active .nav-label { color: var(--gold); }
    .nav-item[data-page="hub"].active::before { background: var(--gold); }

    .nav-item[data-page="academy"].active .nav-icon svg { stroke: var(--blue); }
    .nav-item[data-page="academy"].active .nav-label { color: var(--blue); }
    .nav-item[data-page="academy"].active::before { background: var(--blue); }

    .nav-item[data-page="journal"].active .nav-icon svg { stroke: var(--gold3); }
    .nav-item[data-page="journal"].active .nav-label { color: var(--gold3); }
    .nav-item[data-page="journal"].active::before { background: var(--gold3); }

    .nav-item[data-page="capital"].active .nav-icon svg { stroke: var(--purple); }
    .nav-item[data-page="capital"].active .nav-label { color: var(--purple); }
    .nav-item[data-page="capital"].active::before { background: var(--purple); }

    /* ============================================
       INSTALL BANNER
       ============================================ */
    .install-banner {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: linear-gradient(135deg, rgba(212,160,23,.08) 0%, rgba(167,139,250,.06) 100%);
      border-bottom: 1px solid rgba(212,160,23,.12);
      flex-shrink: 0;
    }

    .install-banner.show { display: flex; }

    .install-banner .ib-text {
      flex: 1;
      font-size: 13px;
      color: var(--t2);
      font-weight: 500;
    }

    .install-banner .ib-text strong {
      color: var(--gold);
    }

    .install-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .install-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(212, 160, 23, .3);
    }

    .install-btn:active {
      transform: scale(.96);
    }

    .ib-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--t3);
      cursor: pointer;
      border-radius: 6px;
      font-size: 18px;
      transition: all var(--transition);
    }

    .ib-close:hover {
      background: var(--bg3);
      color: var(--t1);
    }

    /* ============================================
       SPLASH SCREEN
       ============================================ */
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 30%, rgba(212,160,23,.08) 0%, var(--bg) 60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity .5s ease, transform .5s ease;
    }

    .splash.hide {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      animation: splash-in .6s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes splash-in {
      from { opacity: 0; transform: scale(.5) rotate(-10deg); }
      to { opacity: 1; transform: scale(1) rotate(0); }
    }

    .splash-title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: splash-text .6s ease .2s both;
    }

    @keyframes splash-text {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .splash-sub {
      font-size: 13px;
      color: var(--t3);
      font-weight: 500;
      animation: splash-text .6s ease .4s both;
    }

    .splash-bar {
      width: 120px;
      height: 3px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
      animation: splash-text .6s ease .5s both;
    }

    .splash-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold3));
      border-radius: 3px;
      transition: width .8s ease;
    }

    .splash-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .splash-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat 3s ease-in-out infinite;
    }
    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0); }
      20% { opacity: .6; }
      100% { opacity: 0; transform: translateY(-120px) scale(1); }
    }

    /* ============================================
       SAFE AREA — iPhone notch / home indicator
       ============================================ */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .bottom-nav {
        padding-bottom: calc(env(safe-area-inset-bottom) + 4px);
        height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      }
      .top-bar {
        padding-top: env(safe-area-inset-top);
      }
    }

    /* ============================================
       TRES PETITS ECRANS (< 380px)
       ============================================ */
    @media (max-width: 380px) {
      .nav-item {
        min-width: 50px;
        padding: 6px 8px;
      }
      .nav-item .nav-label {
        font-size: 9px;
      }
      .top-bar .logo span {
        font-size: 15px;
      }
    }

    /* ============================================
       DESKTOP : sidebar au lieu de bottom nav
       ============================================ */
    @media (min-width: 769px) {
      .app {
        flex-direction: row;
      }

      .top-bar {
        display: none;
      }

      .bottom-nav {
        flex-direction: column;
        width: var(--side-w);
        height: 100%;
        border-top: none;
        border-right: 1px solid var(--border);
        padding: 16px 0 16px;
        justify-content: flex-start;
        gap: 4px;
      }

      .nav-item {
        width: 56px;
        height: 52px;
        border-radius: 12px;
        padding: 6px;
      }

      .nav-item .nav-label {
        font-size: 9px;
      }

      .nav-item.active::before {
        top: 50%;
        left: -1px;
        right: auto;
        transform: translateY(-50%);
        width: 3px;
        height: 24px;
        border-radius: 0 3px 3px 0;
      }

      @keyframes nav-indicator {
        from { height: 0; opacity: 0; }
        to { height: 24px; opacity: 1; }
      }

      .nav-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
      }

      .nav-logo svg {
        width: 36px;
        height: 36px;
      }

      .nav-logo span {
        font-size: 10px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--gold3), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: .5px;
      }

      .content-area {
        order: 2;
      }

      .bottom-nav {
        order: 1;
      }

      .install-banner {
        order: 0;
      }
    }

    /* ============================================
       OFFLINE INDICATOR
       ============================================ */
    .offline-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 71, 87, .15);
      border-bottom: 1px solid rgba(255, 71, 87, .3);
      font-size: 12px;
      font-weight: 600;
      color: var(--red);
      flex-shrink: 0;
    }

    .offline-bar.show { display: flex; }

    /* ─── LOGIN SCREEN ─── */
    .login-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(212,160,23,.06) 0%, var(--bg) 60%);
      z-index: 9998;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      animation: loginFade .5s ease;
    }
    .login-screen.hide {
      opacity: 0;
      transform: scale(1.03);
      transition: all .4s ease;
      pointer-events: none;
    }
    @keyframes loginFade { from{opacity:0} to{opacity:1} }
    .login-logo { margin-bottom: 8px; }
    .login-title {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--gold3), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-sub {
      font-size: 12px;
      color: var(--t3);
      margin-bottom: 12px;
    }
    .login-input {
      width: 180px;
      padding: 14px;
      background: var(--bg3);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--t1);
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      letter-spacing: 10px;
      text-align: center;
      outline: none;
      transition: border .3s;
      animation: loginBreathe 3s ease-in-out infinite;
    }
    .login-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,160,23,.1);
      animation: none;
    }
    @keyframes loginBreathe {
      0%,100% { border-color: var(--border); }
      50% { border-color: rgba(212,160,23,.2); }
    }
    .login-err {
      font-size: 12px;
      color: var(--red);
      min-height: 18px;
      font-weight: 600;
    }
    .login-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(212,160,23,.25);
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(212,160,23,.35); }
    .login-btn:active { transform: scale(.97); }
    /* First-time setup */
    .setup-text {
      font-size: 13px;
      color: var(--t2);
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ============================================
       SPLASH SCREEN
       ============================================ -->
  <div class="splash" id="splash">
    <svg class="splash-logo" viewBox="0 0 512 512" style="width:120px;height:120px">
      <defs>
        <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f7e08a"/>
          <stop offset="50%" stop-color="#d4a017"/>
          <stop offset="100%" stop-color="#b8860b"/>
        </linearGradient>
        <radialGradient id="sglow" cx="50%" cy="45%" r="35%">
          <stop offset="0%" stop-color="#d4a017" stop-opacity=".12"/>
          <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="512" height="512" fill="#06090e" rx="0"/>
      <circle cx="256" cy="220" r="180" fill="url(#sglow)"/>
      <circle cx="256" cy="256" r="200" fill="none" stroke="#d4a017" stroke-width="1" opacity=".08"/>
      <circle cx="256" cy="256" r="220" fill="none" stroke="#d4a017" stroke-width="1" opacity=".04"/>
      <text x="256" y="245" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="800" font-size="96" fill="url(#sg)">Au</text>
      <line x1="236" y1="270" x2="276" y2="270" stroke="#d4a017" stroke-width="1.5" opacity=".5" stroke-linecap="round"/>
      <text x="256" y="300" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="600" font-size="13" fill="#d4a017" opacity=".4" letter-spacing="8">AURUM</text>
    </svg>
    <div class="splash-title">Aurum</div>
    <div class="splash-sub">Trading & Patrimoine</div>
    <div class="splash-bar"><div class="splash-bar-fill" id="splashFill"></div></div>
    <div class="splash-particles" id="splashParticles"></div>
  </div>

  <!-- ============================================
       LOGIN / SETUP SCREEN
       ============================================ -->
  <div class="login-screen" id="loginScreen" style="display:none">
    <div class="login-logo">
      <svg viewBox="0 0 512 512" width="80" height="80">
        <defs><linearGradient id="lg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f7e08a"/><stop offset="50%" stop-color="#d4a017"/><stop offset="100%" stop-color="#b8860b"/></linearGradient><radialGradient id="lgw" cx="50%" cy="45%" r="35%"><stop offset="0%" stop-color="#d4a017" stop-opacity=".12"/><stop offset="100%" stop-color="#d4a017" stop-opacity="0"/></radialGradient></defs>
        <rect width="512" height="512" fill="#06090e"/>
        <circle cx="256" cy="220" r="180" fill="url(#lgw)"/>
        <circle cx="256" cy="256" r="200" fill="none" stroke="#d4a017" stroke-width="1" opacity=".08"/>
        <text x="256" y="245" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="800" font-size="96" fill="url(#lg)">Au</text>
        <line x1="236" y1="270" x2="276" y2="270" stroke="#d4a017" stroke-width="1.5" opacity=".5" stroke-linecap="round"/>
        <text x="256" y="300" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="600" font-size="13" fill="#d4a017" opacity=".4" letter-spacing="8">AURUM</text>
      </svg>
    </div>
    <div class="login-title" id="loginTitle">Aurum</div>
    <div class="login-sub" id="loginSub">Ton avantage, documenté.</div>
    <div class="setup-text" id="setupText" style="display:none"></div>
    <input type="password" class="login-input" id="loginCode" maxlength="4" placeholder="••••" autofocus>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Accéder</button>
  </div>

  <!-- ============================================
       APP SHELL
       ============================================ -->
  <div class="app" id="app" style="opacity:0">

    <!-- Top bar mobile -->
    <div class="top-bar">
      <div class="logo">
        <svg viewBox="0 0 192 192">
          <defs>
            <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#f5d060"/>
              <stop offset="50%" stop-color="#d4a017"/>
              <stop offset="100%" stop-color="#b8860b"/>
            </linearGradient>
          </defs>
          <rect width="192" height="192" rx="38" fill="#0c1018"/>
          <path d="M96 36 L140 148 H126 L116 120 H76 L66 148 H52 Z M82 106 H110 L96 62 Z" fill="url(#tg)"/>
        </svg>
        <span>Aurum</span>
      </div>
      <div class="page-title" id="pageTitle"></div>
      <div class="status" id="netStatus">
        <div class="dot"></div>
        <span>En ligne</span>
      </div>
    </div>

    <!-- Install banner -->
    <div class="install-banner" id="installBanner">
      <div class="ib-text">Installer <strong>Aurum</strong> sur votre appareil</div>
      <button class="install-btn" id="installBtn" onclick="installApp()">Installer</button>
      <button class="ib-close" onclick="dismissInstall()">&times;</button>
    </div>

    <!-- Offline bar -->
    <div class="offline-bar" id="offlineBar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
      Mode hors-ligne — vos données sont sauvegardées
    </div>

    <!-- Content area -->
    <div class="content-area" id="contentArea">
      <!-- Loading -->
      <div class="page-loader" id="pageLoader">
        <div class="loader-spinner"></div>
        <div class="loader-text">Chargement...</div>
      </div>

      <!-- Iframes chargées dynamiquement -->
    </div>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" id="bottomNav">
      <!-- Desktop logo -->
      <div class="nav-logo" style="display:none">
        <svg viewBox="0 0 192 192">
          <defs><linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f5d060"/><stop offset="50%" stop-color="#d4a017"/><stop offset="100%" stop-color="#b8860b"/></linearGradient></defs>
          <rect width="192" height="192" rx="38" fill="#0c1018"/>
          <path d="M96 36 L140 148 H126 L116 120 H76 L66 148 H52 Z M82 106 H110 L96 62 Z" fill="url(#ng)"/>
        </svg>
        <span>Aurum</span>
      </div>

      <!-- Logo = Home (Hub) -->
      <div class="nav-home" onclick="navigate('hub')">
        <svg viewBox="0 0 192 192" width="32" height="32">
          <defs><linearGradient id="nh" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#f7e08a"/><stop offset="50%" stop-color="#d4a017"/><stop offset="100%" stop-color="#b8860b"/></linearGradient></defs>
          <rect width="192" height="192" rx="38" fill="#0c1018"/>
          <rect x="4" y="4" width="184" height="184" rx="36" fill="none" stroke="url(#nh)" stroke-width="2" opacity=".15"/>
          <text x="96" y="108" text-anchor="middle" font-family="DM Sans,sans-serif" font-weight="800" font-size="64" fill="url(#nh)">Au</text>
        </svg>
      </div>

      <!-- Academy -->
      <div class="nav-item" data-page="academy" onclick="navigate('academy')">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <span class="nav-label">Academy</span>
      </div>

      <!-- Journal -->
      <div class="nav-item" data-page="journal" onclick="navigate('journal')">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        </div>
        <span class="nav-label">Journal</span>
      </div>

      <!-- Capital -->
      <div class="nav-item" data-page="capital" onclick="navigate('capital')">
        <div class="nav-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </div>
        <span class="nav-label">Capital</span>
      </div>
    </nav>
  </div>

  <script>
    /* ============================================
       AURUM PWA — Routeur & Navigation
       ============================================ */

    /* ---- Configuration des pages ---- */
    var PAGES = {
      hub:     { src: 'Aurum_Hub.html',     title: 'Hub',     color: '#d4a017' },
      academy: { src: 'Aurum_Academy.html',  title: 'Academy', color: '#5b8def' },
      journal: { src: 'Aurum.html',          title: 'Journal', color: '#f5d060' },
      capital: { src: 'Aurum_Capital.html',  title: 'Capital', color: '#a78bfa' }
    };

    var currentPage = null;
    var frames = {};
    var deferredPrompt = null;

    /* ---- Authentification centralisée ---- */
    function isAuthenticated() {
      try { return sessionStorage.getItem('aurum_auth') === '1'; } catch(e) { return false; }
    }

    function hasCode() {
      try { return !!localStorage.getItem('aurum_code'); } catch(e) { return false; }
    }

    function showLogin() {
      try {
        var screen = document.getElementById('loginScreen');
        screen.style.display = 'flex';
        var codeInput = document.getElementById('loginCode');

        if (!hasCode()) {
          /* Premier lancement — créer un code */
          document.getElementById('loginTitle').textContent = 'Bienvenue';
          document.getElementById('loginSub').textContent = 'Crée ton code d\'accès';
          document.getElementById('setupText').style.display = 'block';
          document.getElementById('setupText').textContent = 'Choisis un code à 4 chiffres. Tu le taperas à chaque ouverture pour protéger tes données.';
          document.getElementById('loginBtn').textContent = 'Créer mon code';
          codeInput.placeholder = '0000';
        } else {
          document.getElementById('loginTitle').textContent = 'Aurum';
          document.getElementById('loginSub').textContent = 'Ton avantage, documenté.';
          document.getElementById('setupText').style.display = 'none';
          document.getElementById('loginBtn').textContent = 'Accéder';
        }
        codeInput.value = '';
        codeInput.focus();
        codeInput.addEventListener('keyup', function(e) {
          if (e.key === 'Enter') handleLogin();
        });
      } catch(e) { startApp(); }
    }

    function handleLogin() {
      try {
        var code = document.getElementById('loginCode').value;
        var err = document.getElementById('loginErr');

        if (code.length !== 4 || !/^\d{4}$/.test(code)) {
          err.textContent = '4 chiffres requis';
          return;
        }

        if (!hasCode()) {
          /* Création du code */
          localStorage.setItem('aurum_code', code);
          sessionStorage.setItem('aurum_auth', '1');
          document.getElementById('loginScreen').classList.add('hide');
          setTimeout(startApp, 400);
        } else {
          /* Vérification */
          var stored = localStorage.getItem('aurum_code');
          if (code === stored) {
            sessionStorage.setItem('aurum_auth', '1');
            /* Aussi mettre enz_role pour que le Journal ne redemande pas */
            sessionStorage.setItem('enz_role', 'a');
            document.getElementById('loginScreen').classList.add('hide');
            setTimeout(startApp, 400);
          } else {
            err.textContent = 'Code incorrect';
            document.getElementById('loginCode').value = '';
            document.getElementById('loginCode').focus();
          }
        }
      } catch(e) { startApp(); }
    }

    function startApp() {
      try {
        document.getElementById('app').style.opacity = '1';
        document.getElementById('app').style.transition = 'opacity .4s ease';
        var hash = window.location.hash.replace('#', '');
        var startPage = PAGES[hash] ? hash : 'hub';
        navigate(startPage, true);
      } catch(e) {}
    }

    /* ---- Splash Screen ---- */
    function initSplash() {
      try {
        var particlesEl = document.getElementById('splashParticles');
        if (particlesEl) {
          for (var i = 0; i < 12; i++) {
            var p = document.createElement('div');
            p.className = 'splash-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = (50 + Math.random() * 40) + '%';
            p.style.animationDelay = (Math.random() * 2) + 's';
            p.style.animationDuration = (2 + Math.random() * 2) + 's';
            particlesEl.appendChild(p);
          }
        }

        var fill = document.getElementById('splashFill');
        fill.style.width = '30%';

        setTimeout(function() { fill.style.width = '70%'; }, 300);
        setTimeout(function() { fill.style.width = '100%'; }, 800);
        setTimeout(function() {
          document.getElementById('splash').classList.add('hide');

          /* Vérifier l'authentification */
          if (isAuthenticated()) {
            startApp();
          } else {
            showLogin();
          }
        }, 1200);
      } catch (e) {
        document.getElementById('splash').style.display = 'none';
        startApp();
      }
    }

    /* ---- Navigation principale ---- */
    function navigate(page, isFirst) {
      try {
        if (page === currentPage && !isFirst) return;

        var prev = currentPage;
        var pageOrder = ['hub', 'academy', 'journal', 'capital'];
        var prevIdx = pageOrder.indexOf(prev);
        var nextIdx = pageOrder.indexOf(page);
        var direction = nextIdx > prevIdx ? 'left' : 'right';
        currentPage = page;
        var config = PAGES[page];

        /* Mettre à jour le hash */
        window.location.hash = page;

        /* Mettre à jour le titre de la page */
        var titleEl = document.getElementById('pageTitle');
        titleEl.textContent = config.title;
        titleEl.classList.remove('vis');
        setTimeout(function() { titleEl.classList.add('vis'); }, 50);

        /* Mettre à jour theme-color */
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', config.color);

        /* Mettre à jour la navigation */
        var navItems = document.querySelectorAll('.nav-item');
        for (var i = 0; i < navItems.length; i++) {
          navItems[i].classList.toggle('active', navItems[i].getAttribute('data-page') === page);
        }

        /* Transition sortie de l'ancien frame */
        if (prev && frames[prev]) {
          frames[prev].classList.remove('active');
          var exitClass = direction === 'left' ? 'exit-left' : 'exit-right';
          frames[prev].classList.add(exitClass);
          (function(p, cls) {
            setTimeout(function() {
              if (frames[p]) {
                frames[p].classList.remove('exit-left');
                frames[p].classList.remove('exit-right');
              }
            }, 400);
          })(prev, exitClass);
        }

        /* Créer ou réafficher le frame */
        if (!frames[page]) {
          createFrame(page, config);
        } else {
          frames[page].classList.add('active');
          document.getElementById('pageLoader').classList.add('hidden');
        }
      } catch (e) {
        console.error('Navigation error:', e);
      }
    }

    /* ---- Création d'iframe ---- */
    function createFrame(page, config) {
      try {
        var loader = document.getElementById('pageLoader');
        loader.classList.remove('hidden');
        var loaderText = loader.querySelector('.loader-text');
        if (loaderText) loaderText.textContent = 'Chargement...';

        var iframe = document.createElement('iframe');
        iframe.className = 'page-frame';
        iframe.setAttribute('data-page', page);
        iframe.setAttribute('title', config.title);
        iframe.setAttribute('loading', 'lazy');

        var loaded = false;

        /* Timeout 5s si l'iframe ne charge pas */
        var timeout = setTimeout(function() {
          try {
            if (!loaded) {
              loaded = true;
              if (loaderText) loaderText.textContent = 'Chargement trop long — vérifiez votre connexion';
              loader.querySelector('.loader-spinner').style.borderTopColor = 'var(--red)';
              setTimeout(function() {
                loader.classList.add('hidden');
                iframe.classList.add('active');
              }, 2000);
            }
          } catch (e) {
            console.error('Frame timeout error:', e);
          }
        }, 5000);

        iframe.addEventListener('load', function() {
          try {
            loaded = true;
            clearTimeout(timeout);
            loader.classList.add('hidden');
            if (loaderText) loaderText.textContent = 'Chargement...';
            loader.querySelector('.loader-spinner').style.borderTopColor = '';
            iframe.classList.add('active');

            /* Intercepter les liens internes dans l'iframe */
            interceptLinks(iframe);
          } catch (e) {
            console.error('Frame load error:', e);
            loader.classList.add('hidden');
            iframe.classList.add('active');
          }
        });

        iframe.src = config.src;
        document.getElementById('contentArea').appendChild(iframe);
        frames[page] = iframe;
      } catch (e) {
        console.error('Create frame error:', e);
      }
    }

    /* ---- Intercepter les liens entre pages ---- */
    function interceptLinks(iframe) {
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;

        doc.addEventListener('click', function(e) {
          try {
            var link = e.target.closest('a[href]');
            if (!link) return;

            var href = link.getAttribute('href');

            /* Mapper les fichiers aux pages */
            var map = {
              'Aurum_Hub.html': 'hub',
              'Aurum_Academy.html': 'academy',
              'Aurum.html': 'journal',
              'Aurum_Capital.html': 'capital'
            };

            for (var file in map) {
              if (href.indexOf(file) !== -1) {
                e.preventDefault();
                e.stopPropagation();
                navigate(map[file]);
                return;
              }
            }
          } catch (err) {
            /* Cross-origin, on laisse le lien normal */
          }
        }, true);
      } catch (e) {
        /* Cross-origin restriction - pas grave */
      }
    }

    /* ---- Navigation par hash ---- */
    window.addEventListener('hashchange', function() {
      try {
        var hash = window.location.hash.replace('#', '');
        if (PAGES[hash] && hash !== currentPage) {
          navigate(hash);
        }
      } catch (e) {
        console.error('Hash change error:', e);
      }
    });

    /* ---- PWA : Installation ---- */
    window.addEventListener('beforeinstallprompt', function(e) {
      try {
        e.preventDefault();
        deferredPrompt = e;

        /* Montrer la bannière si pas déjà dismissée */
        if (!localStorage.getItem('aurum_install_dismissed')) {
          document.getElementById('installBanner').classList.add('show');
        }
      } catch (err) {
        console.error('Install prompt error:', err);
      }
    });

    function installApp() {
      try {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function(result) {
          if (result.outcome === 'accepted') {
            document.getElementById('installBanner').classList.remove('show');
          }
          deferredPrompt = null;
        });
      } catch (e) {
        console.error('Install error:', e);
      }
    }

    function dismissInstall() {
      try {
        document.getElementById('installBanner').classList.remove('show');
        localStorage.setItem('aurum_install_dismissed', '1');
      } catch (e) {
        console.error('Dismiss error:', e);
      }
    }

    /* ---- Détection online/offline ---- */
    function updateOnlineStatus() {
      try {
        var status = document.getElementById('netStatus');
        var offlineBar = document.getElementById('offlineBar');

        if (navigator.onLine) {
          status.classList.remove('offline');
          status.innerHTML = '<div class="dot"></div><span>En ligne</span>';
          offlineBar.classList.remove('show');
        } else {
          status.classList.add('offline');
          status.innerHTML = '<div class="dot"></div><span>Hors-ligne</span>';
          offlineBar.classList.add('show');
        }
      } catch (e) {
        console.error('Status update error:', e);
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);

    /* ---- Desktop : afficher le logo sidebar ---- */
    function handleResize() {
      try {
        var logo = document.querySelector('.nav-logo');
        if (logo) {
          logo.style.display = window.innerWidth >= 769 ? 'flex' : 'none';
        }
      } catch (e) {
        console.error('Resize error:', e);
      }
    }

    window.addEventListener('resize', handleResize);

    /* ---- Swipe navigation mobile ---- */
    var touchStartX = 0;
    var touchEndX = 0;
    var pageOrder = ['hub', 'academy', 'journal', 'capital'];

    document.addEventListener('touchstart', function(e) {
      try { touchStartX = e.changedTouches[0].screenX; } catch(err) {}
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      try {
        touchEndX = e.changedTouches[0].screenX;
        var diff = touchStartX - touchEndX;
        if (Math.abs(diff) < 80) return; // trop court
        var idx = pageOrder.indexOf(currentPage);
        if (idx === -1) return;
        if (diff > 0 && idx < pageOrder.length - 1) {
          navigate(pageOrder[idx + 1]); // swipe gauche = page suivante
        } else if (diff < 0 && idx > 0) {
          navigate(pageOrder[idx - 1]); // swipe droite = page précédente
        }
      } catch(err) {}
    }, { passive: true });

    /* ---- Raccourcis clavier ---- */
    document.addEventListener('keydown', function(e) {
      try {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (e.key === '1') navigate('hub');
        else if (e.key === '2') navigate('academy');
        else if (e.key === '3') navigate('journal');
        else if (e.key === '4') navigate('capital');
      } catch(err) {}
    });

    /* ---- Enregistrement Service Worker ---- */
    function registerSW() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(function(reg) {
          console.log('Aurum SW enregistr\u00e9 :', reg.scope);
        }).catch(function(err) {
          console.warn('Aurum SW erreur :', err);
        });
      }
    }

    /* ---- Démarrage ---- */
    registerSW();
    handleResize();
    updateOnlineStatus();
    initSplash();
  </script>
</body>
