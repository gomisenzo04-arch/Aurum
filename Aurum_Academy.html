<style>
/* ═══ AURUM ACADEMY — UNIFIED FORMATION ═══ */
:root{--bg:#06090e;--bg2:#0c1018;--bg3:#141a26;--bg4:#1b2232;--gold:#d4a017;--gold2:#b8860b;--gold3:#f5d060;--green:#00d68f;--red:#ff4757;--blue:#5b8def;--purple:#a78bfa;--t1:#edf2f7;--t2:#9bafd4;--t3:#6b7ea0;--brd:#1d2840;--brd2:#293756}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:rgba(212,160,23,.3)}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}

/* ─── HEADER ─── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(6,9,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);padding:0 20px;display:flex;align-items:center;height:52px;gap:10px}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--gold);white-space:nowrap;text-decoration:none}
.pbar{flex:1;max-width:300px;margin:0 auto}.pbar-t{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}.pbar-f{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold3));border-radius:3px;transition:width .5s}.pbar-l{font-size:9px;color:var(--t3);text-align:center;margin-top:2px;font-weight:600}
.stars-hd{font-size:11px;color:var(--gold);font-weight:700;white-space:nowrap}
.hdr-links{display:flex;gap:4px}
.hdr-links a{color:var(--t3);font-size:10px;font-weight:600;text-decoration:none;padding:4px 10px;border:1px solid var(--brd);border-radius:5px;transition:all .15s}
.hdr-links a:hover{border-color:var(--gold);color:var(--gold)}

/* ─── LAYOUT ─── */
.lay{display:flex;min-height:calc(100vh - 52px)}
.side{width:220px;background:var(--bg2);border-right:1px solid var(--brd);padding:10px 0;flex-shrink:0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.stit{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:700;padding:8px 14px 4px;margin-top:6px}
.stit:first-child{margin-top:0}
.mi{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:all .12s;border-left:3px solid transparent;font-size:11px;color:var(--t3)}
.mi:hover{background:rgba(212,160,23,.03);color:var(--t2)}
.mi.ac{background:rgba(212,160,23,.06);color:var(--gold);border-left-color:var(--gold)}
.mi.dn{color:var(--green)}
.mi.lk{opacity:.3;cursor:not-allowed}
.mn{width:20px;height:20px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.mi.ac .mn{border-color:var(--gold);color:var(--gold)}
.mi.dn .mn{border-color:var(--green);background:var(--green);color:#fff}
.mi-s{font-size:8px;color:var(--gold);margin-left:auto}
.main{flex:1;padding:24px 28px;max-width:760px;margin:0 auto;overflow-y:auto}

/* ─── MODULE CONTENT ─── */
.md{display:none;animation:fi .3s}.md.vis{display:block}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.mt{font-size:22px;font-weight:800;margin-bottom:3px}.ms{font-size:11px;color:var(--t3);margin-bottom:18px}
h3{font-size:15px;font-weight:700;color:var(--gold);margin:18px 0 8px}
p{font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:10px}p b{color:var(--t1)}

/* ─── EDGE-STYLE COMPONENTS ─── */
.kp{background:rgba(212,160,23,.05);border:1px solid rgba(212,160,23,.15);border-radius:7px;padding:9px 12px;margin-bottom:10px;border-left:3px solid var(--gold)}
.kp .kl{font-size:9px;font-weight:700;color:var(--gold);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}.kp .kt{font-size:12px;line-height:1.6;color:var(--gold3);white-space:pre-line}
.db{background:rgba(0,0,0,.2);border-radius:7px;padding:12px 8px;margin:10px 0;display:flex;justify-content:center;flex-direction:column;align-items:center}
.db svg{width:100%;max-width:580px}.dc{font-size:10px;color:var(--t3);text-align:center;margin-top:4px;font-style:italic}
.ix{background:rgba(15,23,42,.6);border:1px solid rgba(59,130,246,.12);border-radius:7px;padding:10px;margin:10px 0}
.ix .il{font-size:10px;font-weight:700;color:var(--t2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.ix .ii{font-size:12px;color:var(--t2);margin-bottom:6px}
.co{cursor:pointer;transition:all .12s;opacity:.78}.co:hover{opacity:1}
.co.cp{outline:2px solid var(--green);outline-offset:2px;opacity:1}.co.wp{outline:2px solid var(--red);outline-offset:2px;opacity:1}
.ob{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;border-radius:6px;border:1.5px solid var(--brd2);background:var(--bg3);font-size:12px;color:var(--t2);cursor:pointer;transition:all .1s;font-family:inherit;font-weight:500}
.ob:hover{border-color:var(--t3)}.ob.cp{border-color:var(--green);color:var(--green)}.ob.wp{border-color:var(--red);color:var(--red)}
p.tx{font-size:13px;line-height:1.7;color:var(--t2);margin-bottom:9px}p.tx strong{color:var(--t1)}
.lt{font-size:16px;font-weight:600;margin-bottom:10px}

/* ─── EDGE QUIZ ─── */
.qh{background:rgba(212,160,23,.04);border:1px solid rgba(212,160,23,.12);border-radius:7px;padding:10px 14px;margin-bottom:14px}
.qh h3{font-size:14px;font-weight:700;color:var(--gold);margin:0}.qh p{font-size:9px;color:var(--t2);margin:2px 0 0}
.qb{margin-bottom:14px}.qt2{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:5px}.qt2 .qn{color:var(--gold);margin-right:4px}
.qv{background:rgba(0,0,0,.2);border-radius:5px;padding:6px;margin-bottom:5px;display:flex;justify-content:center}.qv svg{max-width:440px;width:100%}
.qo{display:flex;flex-direction:column;gap:3px}
.qi{padding:7px 9px;border-radius:5px;background:var(--bg3);border:1.5px solid var(--brd);cursor:pointer;transition:all .08s;font-size:11px;color:var(--t2)}
.qi:hover:not(.lk){border-color:var(--gold)}.qi.sl{border-color:var(--gold);background:rgba(212,160,23,.05)}
.qi.cr{border-color:var(--green);background:rgba(0,214,143,.06)}.qi.wr{border-color:var(--red);background:rgba(255,71,87,.04)}
.qi.lk{cursor:default}.qi .le{color:var(--t3);margin-right:5px;font-weight:600;font-size:10px}
.rb{text-align:center;padding:14px;border-radius:10px;margin-bottom:14px}
.rb.ps{background:rgba(0,214,143,.05);border:1px solid rgba(0,214,143,.18)}.rb.fl{background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.18)}
.rs{font-size:36px;font-weight:800}.rl{font-size:14px;font-weight:600;margin-top:3px}.rsu{font-size:11px;margin-top:2px}
.br{display:flex;gap:6px;margin-top:14px}

/* ─── EDGE NAV ─── */
.nr{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid var(--brd)}
.bt{padding:8px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .1s}
.bt:hover{transform:translateY(-1px)}.bgg{border:1px solid var(--brd);background:var(--bg3);color:var(--t2)}.bgg:disabled{color:var(--t3);cursor:not-allowed;transform:none}
.byy{background:linear-gradient(135deg,var(--gold3),var(--gold));color:#06090e;font-weight:700}.bnn{background:linear-gradient(135deg,var(--green),#00b377);color:#06090e;font-weight:700}
.warn{background:rgba(212,160,23,.04);border:1px solid rgba(212,160,23,.12);border-radius:5px;padding:7px 10px;margin:8px 0;font-size:11px;color:var(--gold3);border-left:2px solid var(--gold)}
.fb{padding:6px 9px;border-radius:4px;margin-top:5px;font-size:12px;font-weight:500;display:none;line-height:1.4}
.fb.sh{display:block}.fb.ok{background:rgba(0,214,143,.06);color:var(--green);border:1px solid rgba(0,214,143,.15)}.fb.ko{background:rgba(255,71,87,.04);color:var(--red);border:1px solid rgba(255,71,87,.12)}

/* ─── ACADEMY-STYLE COMPONENTS ─── */
.sc{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.sn{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800;font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb2{flex:1;font-size:12px;color:var(--t2);line-height:1.6}.sb2 b{color:var(--t1)}
.co2{border-radius:8px;padding:8px 10px;margin:8px 0;font-size:11px;line-height:1.6;display:flex;gap:8px}.co2.tip{background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.15);color:var(--gold)}

.sim{background:var(--bg2);border:1.5px solid var(--brd);border-radius:10px;padding:16px;margin:12px 0;position:relative}
.sim-tag{position:absolute;top:8px;right:12px;font-size:8px;color:var(--gold);font-weight:700;letter-spacing:1px;opacity:.5}
.sim-hd{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sim-desc{font-size:11px;color:var(--t2);margin-bottom:10px;line-height:1.6;padding:8px 10px;background:var(--bg3);border-radius:6px;border-left:3px solid var(--gold)}
.sim-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.btn{padding:8px 14px;border-radius:7px;border:2px solid var(--brd2);background:var(--bg3);color:var(--t2);font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .12s;font-size:12px}
.btn:hover{border-color:var(--t3);color:var(--t1)}.btn.ok{border-color:var(--green);background:rgba(0,214,143,.08);color:var(--green)}.btn.gd{border-color:var(--gold);background:rgba(212,160,23,.08);color:var(--gold)}.btn.er{border-color:var(--red);animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.btn.lk{opacity:.25;pointer-events:none}
.fbA{font-size:11px;padding:8px 10px;border-radius:6px;margin-top:6px;display:none;line-height:1.6}.fbA.vis{display:block}.fbA.pass{background:rgba(0,214,143,.06);border:1px solid rgba(0,214,143,.15);color:var(--green)}.fbA.fail{background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.12);color:var(--red)}
.res{text-align:center;padding:8px;font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--gold);min-height:24px}

.qz{background:var(--bg2);border:1.5px solid var(--brd);border-radius:10px;padding:16px;margin:16px 0}
.qz-tag{font-size:9px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.qz-ctx{font-size:11px;color:var(--t2);padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:8px;line-height:1.6;border-left:3px solid var(--gold)}
.qz-q{font-size:13px;color:var(--t1);font-weight:600;margin-bottom:8px;line-height:1.5}
.opt{padding:8px 10px;border:1.5px solid var(--brd2);border-radius:7px;cursor:pointer;font-size:12px;color:var(--t2);transition:all .12s;display:flex;gap:8px;align-items:center;margin-bottom:4px}
.opt:hover{border-color:var(--t3);color:var(--t1)}
.ol{width:18px;height:18px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.opt.right{border-color:var(--green);background:rgba(0,214,143,.05);color:var(--green)}.opt.right .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:rgba(255,71,87,.03);color:var(--red);opacity:.5}.opt.done{pointer-events:none}
.qfb{margin-top:6px;padding:8px 10px;border-radius:6px;font-size:11px;line-height:1.6;display:none}.qfb.vis{display:block}.qfb.pass{background:rgba(0,214,143,.06);border:1px solid rgba(0,214,143,.15);color:var(--green)}.qfb.fail{background:rgba(255,71,87,.05);border:1px solid rgba(255,71,87,.12);color:var(--red)}

.trap{background:var(--bg2);border:1px solid rgba(255,71,87,.1);border-left:3px solid var(--red);border-radius:8px;padding:10px 12px;margin:5px 0}
.trap-h{font-size:11px;font-weight:700;color:var(--red);margin-bottom:3px}.trap-p{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:3px}.trap-fix{font-size:10px;color:var(--green);font-weight:600}

.dnd-zone{min-height:50px;padding:4px;border-radius:8px}
.dnd-item{padding:8px 12px;margin:3px 0;border-radius:7px;border:2px solid var(--brd2);background:var(--bg3);color:var(--t2);font-weight:700;font-size:11px;cursor:grab;display:flex;align-items:center;gap:8px;transition:all .15s;user-select:none;-webkit-user-select:none;touch-action:none}
.dnd-item:active{cursor:grabbing}.dnd-item.dragging{opacity:.4;border-color:var(--gold)}
.dnd-item .dnd-h{color:var(--t3);font-size:14px;flex-shrink:0}
.dnd-item.correct{border-color:var(--green);background:rgba(0,214,143,.06);color:var(--green)}
.dnd-item.wrong{border-color:var(--red);background:rgba(255,71,87,.04);color:var(--red)}

.mockup{background:var(--bg3);border:1.5px solid var(--brd);border-radius:10px;padding:14px;margin:8px 0}
.mockup-t{font-size:10px;color:var(--t3);font-weight:600;margin-bottom:8px;text-transform:uppercase}
.mk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd);font-size:11px}.mk-row:last-child{border-bottom:none}
.mk-l{color:var(--t3);width:70px;flex-shrink:0;font-weight:600;font-size:9px;text-transform:uppercase}
.mk-v{color:var(--t1);font-weight:700;flex:1}
.mk-v.clk{cursor:pointer;padding:3px 6px;border-radius:5px;border:1.5px solid transparent;transition:all .12s}
.mk-v.clk:hover{border-color:var(--t3)}
.mk-v.found{border-color:var(--red)!important;background:rgba(255,71,87,.06)!important;color:var(--red);text-decoration:line-through}
.mk-v.clean{border-color:var(--green)!important;background:rgba(0,214,143,.06)!important;color:var(--green)}

.calc-mock{background:var(--bg3);border:1.5px solid var(--brd);border-radius:10px;padding:16px;margin:8px 0;text-align:center}
.calc-sl-btns{display:flex;gap:4px;justify-content:center;margin:6px 0}
.calc-sl-btn{padding:6px 12px;border-radius:6px;border:2px solid var(--brd2);background:var(--bg4);color:var(--t2);font-weight:700;font-size:11px;cursor:pointer;transition:all .12s;font-family:'JetBrains Mono',monospace}
.calc-sl-btn:hover{border-color:var(--t3)}.calc-sl-btn.on{border-color:var(--gold);background:rgba(212,160,23,.1);color:var(--gold)}
.calc-lot{font-size:40px;font-weight:800;color:var(--gold);font-family:'JetBrains Mono',monospace;margin:10px 0;cursor:pointer}

.strip{display:flex;gap:2px;justify-content:center;margin:8px 0;background:var(--bg3);border-radius:8px;padding:6px 4px}
.strip .cell{display:flex;flex-direction:column;align-items:center;padding:3px 8px}.strip .cell .lbl{font-size:7px;color:var(--t3);text-transform:uppercase;font-weight:600}.strip .cell .val{font-size:12px;font-weight:800;font-family:'JetBrains Mono',monospace}.strip .sep{width:1px;background:var(--brd);margin:2px;align-self:stretch}

.bnav{display:flex;justify-content:space-between;margin-top:24px;padding-top:12px;border-top:1px solid var(--brd)}
.nb{padding:8px 20px;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;border:none}
.nb.prev{background:var(--bg3);border:1px solid var(--brd2);color:var(--t2)}.nb.prev:hover{border-color:var(--gold)}
.nb.next{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800}.nb.next:hover{transform:translateY(-1px)}
.nb:disabled{opacity:.2;cursor:default;transform:none!important}

.confetti-cv{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.fin{text-align:center;padding:30px 0}.fin .badge{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold3));display:flex;align-items:center;justify-content:center;font-size:28px;color:#1a1000;margin:0 auto 12px;box-shadow:0 8px 30px rgba(212,160,23,.3);font-weight:800}
.score-card{background:var(--bg2);border:1px solid var(--brd);border-radius:10px;padding:16px;margin:14px auto;max-width:280px}
.score-big{font-size:40px;font-weight:800;font-family:'JetBrains Mono',monospace;background:linear-gradient(135deg,var(--gold),var(--gold3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.pgb{display:flex;gap:3px;margin-bottom:10px}.pgb .dot{flex:1;height:4px;border-radius:2px;background:var(--bg3);transition:background .3s}.pgb .dot.on{background:var(--gold)}

@media(max-width:768px){.side{display:none}.main{padding:14px}.mt{font-size:18px}.strip{flex-wrap:wrap;gap:3px}.strip .sep{display:none}.hdr{padding:0 12px;gap:6px}.hdr-links{display:none}}
/* ─── IFRAME MODE ─── */
.in-iframe .hdr{display:none!important}
.in-iframe .side{display:none!important}
.in-iframe .lay{min-height:100vh}
.in-iframe .main{margin:0 auto;padding-top:16px}
</style>
</head>

{id:"m0",t:"Le système mécanique",s:"Fondation",ic:"\u2699\ufe0f",ls:[
{id:"m0l1",t:"Pourquoi un système mécanique",b:[
{t:"kp",v:"Ce système repose sur UN principe :\n\nActions constantes = résultats constants.\n\nPas de feeling. Pas d'intuition. Pas de \"je pense que le marché va monter\". Chaque décision est dictée par des règles précises, vérifiables, répétables à l'identique."},
{t:"tx",v:"La plupart des stratégies échouent parce qu'elles laissent trop de place au discrétionnaire. Trop de zones grises. Trop de \"ça dépend\". Ce système élimine toutes les zones grises."},
{t:"kp",v:"OBSERVATION EMPIRIQUE :\nQuand le prix dépasse un niveau au-dessus ou en-dessous d'une formation de 3 bougies (liquidité), il réagit dans le sens inverse.\n\nC'est un pattern observable et répétable. On ne cherche pas à comprendre POURQUOI — on exploite le COMMENT."}
]},
{id:"m0l2",t:"Les règles du jeu",b:[
{t:"kp",v:"INSTRUMENT : XAUUSD uniquement (or/dollar)\nTIMEFRAMES : 5 minutes (direction + liquidité) et 1 minute (confirmation + entrée)\nAucun autre timeframe. Pas de 15 min, pas de 1h, pas de daily.\n\nANALYSE : toujours sur PC (TradingView). Jamais sur téléphone.\nEXÉCUTION : MetaTrader 5 sur téléphone. Le lot est connu AVANT d'entrer.\nPas de trading sans préparation complète."},
{t:"kp",v:"2 SETUPS, PAS PLUS :\n1. QM standard (Quasimodo) — quand la structure < 1200 points\n2. Variante Gaps — quand la structure > 1200 points\n\nAucune autre variante. Aucun trade en dehors de ces deux cas. Si le setup n'est pas là, on ne trade pas. Point."},
{t:"kp",v:"PHILOSOPHIE DU RISQUE :\n\u2022 1 seul trade à la fois\n\u2022 Max 4 trades par jour\n\u2022 SL range : 250 à 1200 points\n\u2022 R:R fixe 1:2 (TP = 2x le SL)\n\u2022 Trailing stop mécanique (pas de break even, pas de partiels)\n\u2022 Tout fermé à 21h maximum\n\nLe trailing signifie que quand le SL se déplace, la perte réelle est souvent INFÉRIEURE à 1R. Exemple : SL initial 750 pts = 1%. Trail ramène à 350 pts = 0.47R réel."}
]},
{id:"m0l3",t:"La progression",b:[
{t:"kp",v:"SCALING PYRAMIDAL :\nChaque palier finance le suivant.\n\n1. Petit compte (challenge prop firm) \u2192 profits \u2192 financent un compte plus gros\n2. Compte moyen \u2192 premiers revenus + rachat d'un plus gros compte\n3. Gros compte \u2192 scaling des revenus + capital personnel\n4. Capital personnel : alimenté mois par mois, broker A-book\n\nPas de précipitation. Le processus est progressif."},
{t:"kp",v:"RISQUE PAR PALIER :\n\u2022 Milliers (1K - 99K) : 1% par trade\n\u2022 Centaines de milliers (100K - 999K) : 0,5% par trade\n\u2022 Millions (1M+) : 0,25% par trade\n\nProp firm : risque calculé sur le solde INITIAL\nCompte personnel : risque calculé sur le solde ACTUEL"},
{t:"tx",v:"La suite de la formation couvre chaque concept en détail. <strong>Maîtrise chaque module avant de passer au suivant.</strong> Il n'y a pas de raccourci — la qualité de ta formation détermine la qualité de tes résultats."}
]}
],q:[
{q:"Le système est basé sur :",o:["L'intuition et l'expérience","Des règles mécaniques répétables","L'analyse fondamentale"],a:1},
{q:"Combien de setups différents ?",o:["1","2","5","Illimité"],a:1},
{q:"Timeframes utilisés :",o:["1 min + 5 min","5 min + 15 min","1 min + 1h","Daily + 4h"],a:0},
{q:"Analyse sur :",o:["Téléphone","PC (TradingView)","Les deux"],a:1},
{q:"Exécution sur :",o:["PC","Téléphone (MT5)","Les deux"],a:1},
{q:"R:R du système :",o:["1:1","1:1.5","1:2","Variable"],a:2},
{q:"Risque par trade sur un compte de 50K :",o:["0,25%","0,5%","1%"],a:2},
{q:"Risque par trade sur un compte de 200K :",o:["0,25%","0,5%","1%"],a:1},
{q:"Trailing stop signifie :",o:["Break even automatique","SL qui se déplace = perte réelle souvent < 1R","Prise de profit partielle"],a:1},
{q:"Pas de préparation = ",o:["Trade avec lot réduit","Pas de trading","Analyser sur téléphone"],a:1}
]},
// ========== M1: BOUGIES ==========
{id:"m1",t:"Les bougies japonaises",s:"Fondamentaux",ic:"🕯",ls:[
{id:"m1l1",t:"Anatomie d'une bougie",b:[
{t:"tx",v:"Chaque bougie représente une période de temps et contient 4 données : <strong>ouverture</strong>, <strong>clôture</strong>, <strong>plus haut</strong> (mèche haute), <strong>plus bas</strong> (mèche basse)."},
{t:"dg",svg:`<svg viewBox="0 0 580 240"><text x="145" y="16" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">HAUSSIÈRE</text>${gC(145,30,52,162,205)}<text x="105" y="60" text-anchor="end" fill="#22c55e" font-size="9.5" font-weight="600">Clôture →</text><text x="105" y="168" text-anchor="end" fill="#22c55e" font-size="9.5" font-weight="600">Ouverture →</text><text x="145" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="700">CORPS</text><text x="435" y="16" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">BAISSIÈRE</text>${rC(435,30,52,162,205)}<text x="395" y="60" text-anchor="end" fill="#ef4444" font-size="9.5" font-weight="600">Ouverture →</text><text x="395" y="168" text-anchor="end" fill="#ef4444" font-size="9.5" font-weight="600">Clôture →</text><text x="435" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="700">CORPS</text></svg>`,c:"Haussière (verte) : ouverture en bas, clôture en haut. Baissière (rouge) : inversé."},
{t:"kp",v:"Une bougie ouvre TOUJOURS à la clôture de la précédente.\nLa couleur indique le sens : verte = prix monté, rouge = prix descendu.\nLes mèches = extrêmes atteints. Le corps = écart ouverture/clôture."},
{t:"ix",id:"e1a",ins:"Identifie la bougie haussière :",svg:`<svg viewBox="0 0 340 150"><g class="co" data-answer="wrong" onclick="cI(this)">${rC(70,18,36,108,138)}<text x="70" y="148" text-anchor="middle" fill="#64748b" font-size="10">A</text></g><g class="co" data-answer="correct" onclick="cI(this)">${gC(180,28,48,118,142)}<text x="180" y="148" text-anchor="middle" fill="#64748b" font-size="10">B</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${rC(280,22,40,95,128)}<text x="280" y="148" text-anchor="middle" fill="#64748b" font-size="10">C</text></g></svg>`,ok:"B — verte, le prix a monté.",ko:"B est la haussière (verte). A et C sont baissières (rouges)."},
{t:"ix",id:"e1b",ins:"Sur cette bougie verte, où se situe la clôture ?",svg:`<svg viewBox="0 0 240 170">${gC(120,18,42,120,155,28)}<g class="co" data-answer="correct" onclick="cI(this)"><circle cx="120" cy="42" r="12" fill="transparent" stroke="rgba(212,160,23,.3)" stroke-width="1.5"/><text x="160" y="46" fill="#94a3b8" font-size="10">A — Haut du corps</text></g><g class="co" data-answer="wrong" onclick="cI(this)"><circle cx="120" cy="120" r="12" fill="transparent" stroke="rgba(212,160,23,.3)" stroke-width="1.5"/><text x="160" y="124" fill="#94a3b8" font-size="10">B — Bas du corps</text></g></svg>`,ok:"A — sur une haussière, la clôture est en haut du corps.",ko:"Sur une haussière (verte), clôture = HAUT du corps (A)."}
]},
{id:"m1l2",t:"Instrument et timeframes",b:[
{t:"tx",v:"Cette stratégie s'applique exclusivement au <strong>XAUUSD</strong> (or/dollar). Si le prix affiche 4700, une once d'or vaut 4700 $."},
{t:"kp",v:"Deux timeframes uniquement :\n• 5 MINUTES — direction du marché + identification des liquidités\n• 1 MINUTE — confirmation d'entrée (pattern Quasimodo)\n\nAucun autre timeframe n'est utilisé. Pas de 15 min, pas de 1h, pas de daily."},
{t:"ix",id:"e1c",ins:"Le 5 minutes sert à :",svg:`<svg viewBox="0 0 380 50"><g class="co ob" data-answer="correct" onclick="cI(this)" style="padding:6px 12px;border-radius:5px;border:1.5px solid #1d2840;background:#0c1018;font-size:10px;color:#cbd5e1;display:inline-flex;position:absolute;left:10px;top:5px">Direction + Liquidité</g><g class="co ob" data-answer="wrong" onclick="cI(this)" style="padding:6px 12px;border-radius:5px;border:1.5px solid #1d2840;background:#0c1018;font-size:10px;color:#cbd5e1;display:inline-flex;position:absolute;left:200px;top:5px">Confirmation d'entrée</g></svg>`,ok:"5 min = direction + liquidité.",ko:"5 min = direction + liquidité. La confirmation c'est le 1 min."}
]}
],q:[
{q:"Le corps d'une bougie représente l'écart entre...",o:["Le plus haut et le plus bas","L'ouverture et la clôture","Le volume et le prix"],a:1},
{q:"v",vs:`<svg viewBox="0 0 140 110">${rC(70,8,24,76,100,24)}</svg>`,qt:"Type de cette bougie :",o:["Haussière","Baissière"],a:1},
{q:"v",vs:`<svg viewBox="0 0 140 110">${gC(70,10,28,80,102,24)}</svg>`,qt:"Où se trouve l'ouverture ?",o:["Haut du corps","Bas du corps","Haut de la mèche"],a:1},
{q:"v",vs:`<svg viewBox="0 0 140 110">${rC(70,8,24,76,100,24)}</svg>`,qt:"Où se trouve l'ouverture ?",o:["Haut du corps","Bas du corps","Bas de la mèche"],a:0},
{q:"Une bougie ouvre toujours...",o:["À l'ouverture de la précédente","À la clôture de la précédente","Au point le plus haut"],a:1},
{q:"Timeframes de la stratégie :",o:["1 min + 15 min","5 min + 1 min","5 min + 1h"],a:1},
{q:"Le 1 minute sert à...",o:["Lire la direction","Identifier les liquidités","Confirmer l'entrée"],a:2},
{q:"Instrument tradé :",o:["EUR/USD","XAUUSD","BTC/USD","S&P 500"],a:1},
{q:"v",vs:`<svg viewBox="0 0 280 100">${gC(55,10,22,60,88,18)}<text x="55" y="98" text-anchor="middle" fill="#64748b" font-size="9">A</text>${rC(140,14,28,68,85,18)}<text x="140" y="98" text-anchor="middle" fill="#64748b" font-size="9">B</text>${gC(225,6,18,72,92,18)}<text x="225" y="98" text-anchor="middle" fill="#64748b" font-size="9">C</text></svg>`,qt:"Quelle bougie a le plus grand corps ?",o:["A","B","C"],a:2},
{q:"Une bougie verte avec une très longue mèche haute est-elle haussière ?",o:["Non, la mèche change le type","Oui, seule la couleur du corps détermine le type"],a:1}
]},

// ========== M2: S/R ==========
{id:"m2",t:"Supports & Résistances",s:"Niveaux clés",ic:"📐",ls:[
{id:"m2l1",t:"Support et résistance",b:[
{t:"kp",v:"SUPPORT = bougie BAISSIÈRE puis HAUSSIÈRE. Niveau = clôture de la baissière.\nRÉSISTANCE = bougie HAUSSIÈRE puis BAISSIÈRE. Niveau = clôture de la haussière.\nValidés à la clôture de la 2ème bougie."},
{t:"dg",svg:`<svg viewBox="0 0 540 170"><text x="135" y="14" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600">SUPPORT</text>${rC(95,16,30,88,112,18)}${gC(175,25,45,86,105,18)}<line x1="65" y1="88" x2="215" y2="88" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4 3"/><text x="230" y="91" fill="#3b82f6" font-size="8.5">clôture baissière</text><text x="395" y="14" text-anchor="middle" fill="#d4a017" font-size="11" font-weight="600">RÉSISTANCE</text>${gC(355,28,48,115,140,18)}${rC(435,22,40,100,128,18)}<line x1="325" y1="48" x2="475" y2="48" stroke="#d4a017" stroke-width="1.2" stroke-dasharray="4 3"/><text x="490" y="51" fill="#d4a017" font-size="8.5">clôture haussière</text></svg>`,c:"Support = rouge+vert. Résistance = vert+rouge."},
{t:"ix",id:"e2a",ins:"Identifie le SUPPORT valide parmi ces 4 paires :",svg:`<svg viewBox="0 0 500 135"><g class="co" data-answer="wrong" onclick="cI(this)">${gC(35,18,30,65,85,14)}${rC(68,22,35,68,82,14)}<text x="51" y="110" text-anchor="middle" fill="#64748b" font-size="9">A</text></g><g class="co" data-answer="correct" onclick="cI(this)">${rC(150,15,28,72,92,14)}${gC(183,22,40,70,88,14)}<text x="166" y="110" text-anchor="middle" fill="#64748b" font-size="9">B</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${rC(265,18,30,70,88,14)}${rC(298,22,38,75,92,14)}<text x="281" y="110" text-anchor="middle" fill="#64748b" font-size="9">C</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${gC(380,20,32,68,85,14)}${gC(413,18,28,62,80,14)}<text x="396" y="110" text-anchor="middle" fill="#64748b" font-size="9">D</text></g></svg>`,ok:"B — baissière puis haussière. A = résistance, C = deux baissières, D = deux haussières.",ko:"B : rouge puis vert = support. Pas d'autre paire valide."}
]},
{id:"m2l2",t:"Définition de « casser »",b:[
{t:"kp",v:"CASSER = le CORPS d'une bougie CLÔTURE au-delà du niveau.\nLa mèche seule ne suffit JAMAIS.\nCette règle est universelle dans toute la stratégie.\n\nSeule exception : la prise de liquidité (mèche ou corps suffit)."},
{t:"dg",svg:`<svg viewBox="0 0 440 150"><line x1="20" y1="72" x2="220" y2="72" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/><text x="120" y="65" text-anchor="middle" fill="#3b82f6" font-size="8.5">Niveau</text>${rC(65,30,42,65,95,18)}<text x="65" y="115" text-anchor="middle" fill="#94a3b8" font-size="9">Mèche seule</text><text x="65" y="126" text-anchor="middle" fill="#ef4444" font-size="8.5" font-weight="600">PAS cassé</text>${rC(170,28,38,92,118,18)}<text x="170" y="132" text-anchor="middle" fill="#94a3b8" font-size="9">Corps au-delà</text><text x="170" y="143" text-anchor="middle" fill="#22c55e" font-size="8.5" font-weight="600">CASSÉ</text></svg>`,c:"Corps clôture au-delà = cassé. Mèche seule = PAS cassé."},
{t:"ix",id:"e2b",ins:"La mèche dépasse le support de 300 points mais le corps clôture 1 point au-dessus. Le support est-il cassé ?",svg:`<svg viewBox="0 0 260 48"><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:8px;top:5px">Oui, 300 points c'est significatif</g><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:195px;top:5px">Non</g></svg>`,ok:"Non. Peu importe la taille de la mèche : si le corps ne clôture pas au-delà, ce n'est pas cassé.",ko:"Peu importe que la mèche dépasse de 300 ou 3000 points. Seul le CORPS compte."}
]}
],q:[

{q:"v",vs:`<svg viewBox="0 0 180 90">${rC(45,12,24,68,85,16)}${gC(105,18,32,65,80,16)}</svg>`,qt:"Ce pattern forme...",o:["Un support","Une résistance","Rien de valide"],a:0},
{q:"v",vs:`<svg viewBox="0 0 180 90">${rC(45,14,26,68,85,16)}${rC(105,18,30,72,88,16)}</svg>`,qt:"Ce pattern forme...",o:["Un support","Une résistance","Ni l'un ni l'autre"],a:2}
]},

// ========== M3: PULLBACKS ==========
{id:"m3",t:"Pullbacks & Direction",s:"Lire la tendance",ic:"📈",ls:[
{id:"m3l1",t:"Pullback valide et changement de direction",b:[
{t:"kp",v:"PULLBACK VALIDE = contient au minimum 2 bougies CONSÉCUTIVES dans le sens opposé à la tendance. Position dans le pullback : indifférente.\n\nFin du pullback = cassure du S/R le plus extrême du pullback."},
{t:"kp",v:"CHANGEMENT DE DIRECTION :\nCorps clôture au-delà de la MÈCHE LA PLUS HAUTE/BASSE des 2 bougies formant la résistance/support du dernier pullback valide le plus proche.\n\nDirection = toujours haussier ou baissier. Jamais neutre.\nSi nouveaux pullbacks → on met à jour le niveau de référence."},
{t:"ix",id:"e3a",ins:"Un pullback contient dans l'ordre : verte, rouge, verte, rouge, verte. Est-il valide ?",svg:`<svg viewBox="0 0 260 42"><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:8px;top:3px">Oui</g><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:80px;top:3px">Non</g></svg>`,ok:"Non. Aucune paire de 2 bougies consécutives de même couleur. Verte-rouge alternent systématiquement.",ko:"Aucune paire consécutive de même couleur : verte-rouge-verte-rouge-verte. Pas valide."},
{t:"ix",id:"e3b",ins:"Un pullback contient : rouge, verte, verte, rouge. Est-il valide ?",svg:`<svg viewBox="0 0 260 42"><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:8px;top:3px">Oui</g><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:80px;top:3px">Non</g></svg>`,ok:"Oui. Positions 2 et 3 = deux vertes consécutives.",ko:"Si : positions 2-3 = deux vertes consécutives → valide."}
]}
],q:[
{q:"Minimum de bougies consécutives pour un pullback valide :",o:["1","2","3"],a:1},
{q:"Les 2 bougies consécutives peuvent être...",o:["Uniquement au début","Uniquement à la fin","N'importe où dans le pullback"],a:2},
{q:"Pullback : rouge, verte, rouge, verte. Valide ?",o:["Oui","Non — aucune paire consécutive"],a:1},
{q:"Pullback : verte, verte, rouge, verte. Valide ?",o:["Oui — 2 vertes consécutives au début","Non"],a:0},
{q:"Pullback : rouge, rouge, verte, rouge, verte, verte. Valide ?",o:["Oui","Non"],a:0},
{q:"Pour passer baissier → haussier, le corps clôture au-dessus de...",o:["La clôture de la résistance","La mèche la plus haute des 2 bougies de la résistance","Le corps de la bougie précédente"],a:1},
{q:"La direction peut-elle être neutre ?",o:["Oui, quand le marché est calme","Non, toujours haussier ou baissier"],a:1},
{q:"Fin du pullback =",o:["Après 10 bougies","Cassure du S/R le plus extrême du pullback","Changement de couleur"],a:1},
{q:"Quel pullback sert de référence pour la direction ?",o:["Le premier formé","Le plus gros","Le dernier valide le plus proche du prix"],a:2},
{q:"Si de nouveaux pullbacks se créent...",o:["On garde l'ancien","On met à jour le niveau de référence"],a:1}
]},

// ========== M4: LIQUIDITÉ ==========
{id:"m4",t:"La Liquidité",s:"Concept central",ic:"💧",ls:[
{id:"m4l1",t:"Formation et identification",b:[
{t:"kp",v:"LIQUIDITÉ = 3 bougies CLÔTURÉES, couleur indifférente.\n\nBaissière : mèche HAUTE de la bougie du milieu STRICTEMENT plus haute que les 2 voisines.\nHaussière : mèche BASSE de la bougie du milieu STRICTEMENT plus basse que les 2 voisines."},

{id:"m5",t:"Le Quasimodo",s:"Confirmation d'entrée",ic:"🎯",ls:[
{id:"m5l1",t:"QM baissier (M) et haussier (W)",b:[
{t:"kp",v:"QM BAISSIER = forme de M (pointe droite + haute que la gauche) :\n1. Résistance → 2. Support → 3. Casse résistance (nouveau + haut) → 4. Casse support → SELL\n\nQM HAUSSIER = forme de W (pointe droite + basse que la gauche) :\n1. Support → 2. Résistance → 3. Casse support (nouveau + bas) → 4. Casse résistance → BUY\n\nEntrée = clôture de la DERNIÈRE cassure.\nSur le 1 min : pas de pullback 2 bougies requis. Nb bougies indifférent."},
{t:"dg",svg:`<svg viewBox="0 0 520 160"><text x="130" y="12" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">QM BAISSIER = M</text><polyline points="20,110 60,48 90,72 125,25 185,130" fill="none" stroke="#64748b" stroke-width="2" stroke-linejoin="round" opacity=".4"/><circle cx="60" cy="48" r="3" fill="#d4a017"/><text x="60" y="42" text-anchor="middle" fill="#d4a017" font-size="7.5">1.Rés</text><circle cx="90" cy="72" r="3" fill="#3b82f6"/><text x="90" y="84" text-anchor="middle" fill="#3b82f6" font-size="7.5">2.Sup</text><circle cx="125" cy="25" r="3" fill="#22c55e"/><text x="125" y="18" text-anchor="middle" fill="#22c55e" font-size="7.5">3.Casse rés</text><circle cx="185" cy="130" r="4" fill="#ef4444"/><text x="185" y="148" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">4.SELL</text><text x="390" y="12" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="600">QM HAUSSIER = W</text><polyline points="280,42 320,105 350,78 385,125 445,22" fill="none" stroke="#64748b" stroke-width="2" stroke-linejoin="round" opacity=".4"/><circle cx="320" cy="105" r="3" fill="#3b82f6"/><text x="320" y="118" text-anchor="middle" fill="#3b82f6" font-size="7.5">1.Sup</text><circle cx="350" cy="78" r="3" fill="#d4a017"/><text x="350" y="72" text-anchor="middle" fill="#d4a017" font-size="7.5">2.Rés</text><circle cx="385" cy="125" r="3" fill="#ef4444"/><text x="385" y="140" text-anchor="middle" fill="#ef4444" font-size="7.5">3.Casse sup</text><circle cx="445" cy="22" r="4" fill="#22c55e"/><text x="445" y="15" text-anchor="middle" fill="#22c55e" font-size="8" font-weight="700">4.BUY</text></svg>`,c:"M : pointe droite PLUS HAUTE → sell. W : pointe droite PLUS BASSE → buy."},
{t:"ix",id:"e5a",ins:"Identifie le type de QM :",svg:`<svg viewBox="0 0 250 85"><polyline points="15,62 50,22 80,42 110,10 185,72" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linejoin="round"/></svg>`,_opts:true,optA:"Haussier (W)",optB:"Baissier (M)",answer:"B",okTxt:"M — 2 sommets dont le droit (110,10) est plus haut que le gauche (50,22) → QM baissier.",koTxt:"2 sommets, le droit plus haut = M = baissier."},
{t:"ix",id:"e5b",ins:"Et celui-ci :",svg:`<svg viewBox="0 0 250 85"><polyline points="15,22 50,65 80,45 110,75 185,15" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linejoin="round"/></svg>`,_opts:true,optA:"Haussier (W)",optB:"Baissier (M)",answer:"A",okTxt:"W — 2 creux dont le droit plus bas → QM haussier.",koTxt:"2 creux, le droit plus bas = W = haussier."},
{t:"ix",id:"e5c",ins:"Ce pattern a 2 sommets mais le droit est PLUS BAS que le gauche. QM baissier valide ?",svg:`<svg viewBox="0 0 250 85"><polyline points="15,65 50,15 80,45 110,22 185,72" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linejoin="round"/></svg>`,_opts:true,optA:"Oui, QM baissier",optB:"Non, pas un QM valide",answer:"B",okTxt:"Non. Un QM baissier (M) exige que la pointe droite soit PLUS HAUTE. Ici c'est l'inverse.",koTxt:"Le QM baissier = pointe droite PLUS HAUTE. Ici elle est plus basse → invalide."}
]}

{id:"m11",t:"Compilation : Tout assembler",s:"Journée type",ic:"🎯",ls:[
{id:"m11l1",t:"La journée type",b:[
{t:"tx",v:"Voici exactement ce que tu fais, étape par étape, du réveil au coucher. Chaque décision est mécanique."},
{t:"kp",v:"AVANT LE MARCHÉ :\n1. Forex Factory → news rouges USD du jour (heures exactes)\n2. TradingView 5 min → direction actuelle (dernier pullback valide)\n3. Identifier les liquidités non prises (alertes posées)\n4. Tableau de lots prêt (calculateur Aurum)\n5. Checklist ouverte dans Aurum\n\nRègle : si une étape manque → PAS DE TRADING."},
{t:"kp",v:"PENDANT LE MARCHÉ :\n1. Alerte liquidité touche → passage IMMÉDIAT en 1 min\n2. Vérifier : direction 5 min toujours valide ?\n3. Chercher le QM sur 1 min (ou Gaps si écart > 1200 pts)\n4. QM confirmé → entrée à la clôture de la dernière cassure\n5. SL + TP placés IMMÉDIATEMENT (pas après, pas plus tard)\n6. Trailing actif : surveiller les retracements 1 min\n7. NE TOUCHE PLUS. Laisse le trade vivre.\n\nMax 4 trades/jour. 1 seul à la fois."},
{t:"kp",v:"APRÈS CHAQUE TRADE :\n1. Journal rempli IMMÉDIATEMENT (pas ce soir, pas demain)\n2. 3 screenshots : 5 min contexte, 1 min entrée, résultat\n3. Checklist cochée\n4. Si perte -4% jour → FIN. Si gain +8% → FIN.\n\nAPRÈS LA SESSION :\n- Revoir les trades dans le dashboard\n- Vendredi : review hebdo + backup JSON"}
]},

function goMod(i){
  if(i>0 && S.d.indexOf(i-1)===-1){alert('Complète "'+ALL_MODS[i-1].t+'" d\'abord.');return}

}

function resumeNext(){
  /* Find first non-completed module */
  for(var i=0;i<TOTAL_MODS;i++){
    if(S.d.indexOf(i)===-1){goMod(i);return}
  }
  /* All done */
  goMod(TOTAL_MODS-1);
}

function drawNav(){
  var h='',lastPart='';
  ALL_MODS.forEach(function(m,i){
    if(m.part!==lastPart){
      var colors={strategy:'var(--blue)',app:'var(--green)',capital:'var(--purple)'};
      h+='<div class="stit" style="color:'+colors[m.part]+'">'+m.partLabel+'</div>';
      lastPart=m.part;
    }
    var isDone=S.d.indexOf(i)>=0;
    var isUnlocked=(i===0)||(S.d.indexOf(i-1)>=0);
    var ac=i===S.c?' ac':'',dn=isDone?' dn':'',lk=(!isUnlocked&&!isDone)?' lk':'';
    var icon=isDone?'✓':(!isUnlocked&&!isDone)?'🔒':m.icon||String(i+1);
    var st=isDone?'<span class="mi-s">'+"★".repeat(stars(i))+"☆".repeat(3-stars(i))+'</span>':'';
    var time=MOD_TIME[i]||3;
    h+='<div class="mi'+ac+dn+lk+'" onclick="goMod('+i+')"><div class="mn">'+icon+'</div><div style="flex:1"><div style="font-weight:600;font-size:10px">'+m.t+'</div><div style="font-size:8px;color:var(--t3)">~'+time+' min</div></div>'+st+'</div>';
  });
  document.getElementById('nav').innerHTML=h;
}

function drawProg(){
  var p=Math.round(S.d.length/TOTAL_MODS*100);
  document.getElementById('pF').style.width=p+'%';
  document.getElementById('pL').textContent=S.d.length+'/'+TOTAL_MODS;
  document.getElementById('sT').innerHTML='★ '+totalStars()+'/'+maxStars();
}

// DND
window._initDnD=function(){
 var zone=document.getElementById("dnd-zone");if(!zone)return;
 var dragged=null;
 function gi(el){var ch=zone.children;for(var i=0;i<ch.length;i++)if(ch[i]===el)return i;return -1}
 function onS(e){dragged=e.currentTarget;dragged.classList.add("dragging");e.preventDefault()}
 function onM(e){if(!dragged)return;e.preventDefault();var t=e.touches?e.touches[0]:e;var ch=zone.children;
  for(var i=0;i<ch.length;i++){if(ch[i]===dragged)continue;var r=ch[i].getBoundingClientRect(),mid=r.top+r.height/2;
   if(t.clientY<mid&&gi(dragged)>gi(ch[i])){zone.insertBefore(dragged,ch[i]);break}
   if(t.clientY>mid&&gi(dragged)<gi(ch[i])){zone.insertBefore(dragged,ch[i].nextSibling);break}
  }
 }
 function onE(){if(dragged){dragged.classList.remove("dragging");dragged=null}}
 var items=zone.querySelectorAll(".dnd-item");
 for(var i=0;i<items.length;i++){items[i].addEventListener("mousedown",onS);items[i].addEventListener("touchstart",onS,{passive:false})}
 document.addEventListener("mousemove",onM);document.addEventListener("touchmove",onM,{passive:false});
 document.addEventListener("mouseup",onE);document.addEventListener("touchend",onE);
};
window._checkDnD=function(){
 var zone=document.getElementById("dnd-zone"),ch=zone.querySelectorAll(".dnd-item"),correct=["direction","type","sl","resultat","news"];
 var mi=parseInt(zone.getAttribute("data-m"),10);att(mi);var allOk=true;
 for(var i=0;i<ch.length;i++){if(ch[i].getAttribute("data-key")===correct[i]){ch[i].classList.add("correct");ch[i].classList.remove("wrong")}else{ch[i].classList.add("wrong");ch[i].classList.remove("correct");allOk=false}}
 var fb=zone.parentElement.querySelector(".fb");
 if(allOk){fb.className="fb vis pass";fb.textContent="\u2713 Ordre parfait ! "+"\u2605".repeat(stars(mi));smartMark(mi)}
 else{fb.className="fb vis fail";fb.textContent="\u2717 L'ordre n'est pas bon.";setTimeout(function(){for(var i=0;i<ch.length;i++)ch[i].classList.remove("correct","wrong");fb.className="fb"},2500)}
};

/* ═══ CONFETTI ═══ */
function doConfetti(){
  var c=document.getElementById('confetti'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  var ps=[],cols=['#d4a017','#f5d060','#00d68f','#5b8def','#ff4757','#a78bfa'];
  for(var i=0;i<80;i++)ps.push({x:c.width*Math.random(),y:-20-Math.random()*200,r:3+Math.random()*4,c:cols[Math.floor(Math.random()*6)],vx:(Math.random()-.5)*3,vy:2+Math.random()*4,rot:Math.random()*360,vr:(Math.random()-.5)*8});
  var fr=0;(function draw(){ctx.clearRect(0,0,c.width,c.height);var alive=false;for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.rot+=p.vr;if(p.y<c.height+20)alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore()}fr++;if(alive&&fr<120)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height)})();
}
