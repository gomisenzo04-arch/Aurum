<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aurum Academy — Formation complète</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c9a227">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* Aurum Design System v3.0 — Linear x TradingView x Stripe (aligned with Journal) */
:root {
  /* Backgrounds */
  --bg: #09090b; --bg2: #0f1115; --bg3: #16181d; --bg4: #1e2028;
  /* Borders */
  --border: #1e2028; --border2: #2a2d35; --border3: #3a3d45;
  --brd: var(--border); --brd2: var(--border2);
  /* Gold */
  --gold: #c9a227; --gold2: #a68518; --gold3: #e8c84a;
  --gold-glow: rgba(201,162,39,.08); --gold-border: rgba(201,162,39,.12); --gold-surface: rgba(201,162,39,.05);
  /* Semantic */
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6; --purple: #8b5cf6;
  --green-surface: rgba(34,197,94,.05); --red-surface: rgba(239,68,68,.05);
  /* Text */
  --t1: #ededef; --t2: #8b8d94; --t3: #56585e;
  /* Radius */
  --radius-xs: 4px; --radius-sm: 6px; --radius: 10px; --radius-lg: 14px; --radius-xl: 20px;
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 2px 8px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.03);
  --shadow-lg: 0 8px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
  --shadow-gold: 0 0 16px rgba(201,162,39,.04);
  /* Spacing */
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-6: 24px; --space-8: 32px;
  /* Transitions */
  --ease: cubic-bezier(.2,0,0,1); --duration: 150ms; --duration-fast: 100ms; --duration-slow: 250ms;
  /* Z-index */
  --z-dropdown: 100; --z-sticky: 200; --z-modal: 600; --z-toast: 800; --z-nav: 900; --z-top: 1000;
  /* Legacy compat */
  --transition: .15s cubic-bezier(.2,0,0,1);
  --transition-slow: .25s cubic-bezier(.2,0,0,1)
}
* { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.08) transparent; }
::selection { background: rgba(201,162,39,.2); color: #fff; }
:focus-visible { outline: 2px solid rgba(201,162,39,.3); outline-offset: 2px; border-radius: 4px; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--t1); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; font-size: 13px }
::-webkit-scrollbar { width: 4px; height: 4px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.15) }

/* ─── TOP BAR ─── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 48px;
  background: #09090b;
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; padding: 0 20px; z-index: 1000; gap: 16px;
}
.topbar-logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
  color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: -.02em;
}
.topbar-logo svg { flex-shrink: 0 }
.topbar-nav { display: flex; gap: 4px; margin-left: auto; margin-right: auto }
.topbar-link {
  color: var(--t3); text-decoration: none; font-size: 13px; font-weight: 600;
  padding: 8px 16px; border-radius: var(--radius-sm); transition: var(--transition);
}
.topbar-link:hover { color: var(--t1); background: var(--bg3) }
.topbar-link.active { color: var(--gold); background: rgba(201,162,39,.08) }
.topbar-actions { display: flex; gap: 8px; align-items: center }
.topbar-btn {
  background: none; border: 1px solid rgba(255,255,255,.06); color: var(--t2);
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 150ms cubic-bezier(.2,0,0,1); font-size: 14px;
}
.topbar-btn:hover { border-color: var(--gold); color: var(--gold) }
.topbar-burger {
  display: none; background: none; border: none; cursor: pointer;
  padding: 8px; flex-direction: column; gap: 5px;
}
.topbar-burger span {
  display: block; width: 22px; height: 2px; background: var(--t2);
  border-radius: 2px; transition: var(--transition);
}
.topbar-burger.open span:nth-child(1) { transform: rotate(45deg) translateY(7px) }
.topbar-burger.open span:nth-child(2) { opacity: 0 }
.topbar-burger.open span:nth-child(3) { transform: rotate(-45deg) translateY(-7px) }
.mobile-menu {
  display: none; position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
  background: var(--bg); z-index: 999; padding: 20px; flex-direction: column; gap: 4px;
}
.mobile-menu.open { display: flex }
.mobile-menu a, .mobile-menu button {
  color: var(--t1); text-decoration: none; font-size: 16px; font-weight: 600;
  padding: 14px 16px; border-radius: var(--radius); background: none; border: none;
  text-align: left; cursor: pointer; transition: var(--transition);
  font-family: 'DM Sans', sans-serif;
}
.mobile-menu a:hover, .mobile-menu button:hover { background: var(--bg2) }
/* Academy progress bar (under topbar) */
.academy-progress { position: fixed; top: 48px; left: 0; right: 0; height: 3px; background: var(--bg4); z-index: 999 }
.academy-progress-label { position: fixed; top: 51px; right: 20px; font-size: 10px; color: var(--t3); font-weight: 600; z-index: 999 }

/* ─── LAYOUT ─── */
.lay{display:flex;min-height:calc(100vh - 51px);margin-top:51px}
.side{width:220px;background:var(--bg2);border-right:1px solid rgba(255,255,255,.06);padding:10px 0;flex-shrink:0;position:sticky;top:51px;height:calc(100vh - 51px);overflow-y:auto}
.stit{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);font-weight:700;padding:8px 14px 4px;margin-top:6px}
.stit:first-child{margin-top:0}
.mi{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:all 150ms cubic-bezier(.2,0,0,1);border-left:3px solid transparent;font-size:11px;color:var(--t3)}
.mi:hover{background:rgba(201,162,39,.03);color:var(--t2)}
.mi.ac{background:rgba(201,162,39,.06);color:var(--gold);border-left-color:var(--gold)}
.mi.dn{color:var(--green)}
.mi.lk{opacity:.3;cursor:not-allowed}
.mn{width:20px;height:20px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.mi.ac .mn{border-color:var(--gold);color:var(--gold)}
.mi.dn .mn{border-color:var(--green);background:var(--green);color:#fff}
.mi-s{font-size:10px;color:var(--gold);margin-left:auto}
.main{flex:1;padding:24px 28px;max-width:760px;margin:0 auto;overflow-y:auto}

/* ─── MODULE CONTENT ─── */
.md{display:none;animation:fi .3s}.md.vis{display:block}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.mt{font-size:22px;font-weight:800;margin-bottom:3px;font-family:'Bricolage Grotesque',system-ui,sans-serif}.ms{font-size:11px;color:var(--t3);margin-bottom:18px}
h3{font-size:15px;font-weight:700;color:var(--gold);margin:18px 0 8px;font-family:'Bricolage Grotesque',system-ui,sans-serif}
p{font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:10px}p b{color:var(--t1)}

/* ─── EDGE-STYLE COMPONENTS ─── */
.kp{background:rgba(201,162,39,.05);border:1px solid rgba(201,162,39,.12);border-radius:7px;padding:9px 12px;margin-bottom:10px;border-left:3px solid var(--gold)}
.kp .kl{font-size:10px;font-weight:700;color:var(--gold);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}.kp .kt{font-size:13px;line-height:1.6;color:var(--gold3);white-space:pre-line}
.db{background:rgba(0,0,0,.2);border-radius:7px;padding:12px 8px;margin:10px 0;display:flex;justify-content:center;flex-direction:column;align-items:center}
.db svg{width:100%;max-width:580px}.dc{font-size:11px;color:var(--t3);text-align:center;margin-top:4px;font-style:italic}
.ix{background:rgba(15,23,42,.4);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:10px;margin:10px 0}
.ix .il{font-size:11px;font-weight:700;color:var(--t2);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.ix .ii{font-size:13px;color:var(--t2);margin-bottom:6px}
.co{cursor:pointer;transition:all .12s;opacity:.78}.co:hover{opacity:1}
.co.cp{outline:2px solid var(--green);outline-offset:2px;opacity:1}.co.wp{outline:2px solid var(--red);outline-offset:2px;opacity:1}
.ob{display:inline-flex;align-items:center;justify-content:center;padding:7px 14px;border-radius:6px;border:1.5px solid var(--brd2);background:var(--bg3);font-size:12px;color:var(--t2);cursor:pointer;transition:all .1s;font-family:inherit;font-weight:500}
.ob:hover{border-color:var(--t3)}.ob.cp{border-color:var(--green);color:var(--green)}.ob.wp{border-color:var(--red);color:var(--red)}
p.tx{font-size:13px;line-height:1.7;color:var(--t2);margin-bottom:9px}p.tx strong{color:var(--t1)}
.lt{font-size:16px;font-weight:600;margin-bottom:10px;font-family:'Bricolage Grotesque',system-ui,sans-serif}

/* ─── EDGE QUIZ ─── */
.qh{background:rgba(201,162,39,.04);border:1px solid rgba(201,162,39,.12);border-radius:7px;padding:10px 14px;margin-bottom:14px}
.qh h3{font-size:14px;font-weight:700;color:var(--gold);margin:0}.qh p{font-size:10px;color:var(--t2);margin:2px 0 0}
.qb{margin-bottom:14px}.qt2{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:5px}.qt2 .qn{color:var(--gold);margin-right:4px}
.qv{background:rgba(0,0,0,.2);border-radius:5px;padding:6px;margin-bottom:5px;display:flex;justify-content:center}.qv svg{max-width:440px;width:100%}
.qo{display:flex;flex-direction:column;gap:3px}
.qi{padding:7px 9px;border-radius:5px;background:var(--bg3);border:1.5px solid rgba(255,255,255,.06);cursor:pointer;transition:all 150ms cubic-bezier(.2,0,0,1);font-size:12px;color:var(--t2)}
.qi:hover:not(.lk){border-color:rgba(255,255,255,.1)}.qi.sl{border-color:var(--gold);background:rgba(201,162,39,.05)}
.qi.cr{border-color:var(--green);background:rgba(34,197,94,.05)}.qi.wr{border-color:var(--red);background:rgba(239,68,68,.04)}
.qi.lk{cursor:default}.qi .le{color:var(--t3);margin-right:5px;font-weight:600;font-size:10px}
.rb{text-align:center;padding:14px;border-radius:10px;margin-bottom:14px}
.rb.ps{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.18)}.rb.fl{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.18)}
.rs{font-size:36px;font-weight:800;font-family:'Bricolage Grotesque',system-ui,sans-serif}.rl{font-size:14px;font-weight:600;margin-top:3px}.rsu{font-size:11px;margin-top:2px}
.br{display:flex;gap:6px;margin-top:14px}

/* ─── EDGE NAV ─── */
.nr{display:flex;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.bt{padding:8px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 150ms cubic-bezier(.2,0,0,1)}
.bt:hover{background:var(--bg4)}.bgg{border:1px solid rgba(255,255,255,.06);background:var(--bg3);color:var(--t2)}.bgg:disabled{color:var(--t3);cursor:not-allowed}
.byy{background:rgba(201,162,39,.12);border:1px solid rgba(201,162,39,.3);color:var(--gold);font-weight:700}
.byy:hover{background:rgba(201,162,39,.2);border-color:var(--gold)}.bnn{background:linear-gradient(135deg,var(--green),#16a34a);color:#09090b;font-weight:700}
.warn{background:rgba(201,162,39,.04);border:1px solid rgba(201,162,39,.12);border-radius:5px;padding:7px 10px;margin:8px 0;font-size:11px;color:var(--gold3);border-left:2px solid var(--gold)}
.fb{padding:6px 9px;border-radius:4px;margin-top:5px;font-size:12px;font-weight:500;display:none;line-height:1.4}
.fb.sh{display:block}.fb.ok{background:rgba(34,197,94,.06);color:var(--green);border:1px solid rgba(34,197,94,.15)}.fb.ko{background:rgba(239,68,68,.04);color:var(--red);border:1px solid rgba(239,68,68,.12)}

/* ─── ACADEMY-STYLE COMPONENTS ─── */
.sc{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.sn{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0a0800;font-weight:800;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb{flex:1;font-size:13px;color:var(--t2);line-height:1.6}.sb b{color:var(--t1)}
.sb2{flex:1;font-size:13px;color:var(--t2);line-height:1.6}.sb2 b{color:var(--t1)}
.co2{border-radius:8px;padding:8px 10px;margin:8px 0;font-size:11px;line-height:1.6;display:flex;gap:8px}.co2.tip{background:rgba(201,162,39,.05);border:1px solid rgba(201,162,39,.12);color:var(--gold)}

.sim{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin:12px 0;position:relative}
.sim-tag{position:absolute;top:8px;right:12px;font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1px;opacity:.5}
.sim-hd{font-size:11px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sim-desc{font-size:11px;color:var(--t2);margin-bottom:10px;line-height:1.6;padding:8px 10px;background:var(--bg3);border-radius:6px;border-left:3px solid var(--gold);border:1px solid rgba(255,255,255,.06);border-left:3px solid var(--gold)}
.sim-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.btn{padding:8px 14px;border-radius:7px;border:1px solid rgba(255,255,255,.06);background:var(--bg3);color:var(--t2);font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all 150ms cubic-bezier(.2,0,0,1);font-size:12px}
.btn:hover{border-color:rgba(255,255,255,.1);color:var(--t1)}.btn.ok{border-color:var(--green);background:rgba(34,197,94,.08);color:var(--green)}.btn.gd{border-color:var(--gold);background:rgba(201,162,39,.08);color:var(--gold)}.btn.er{border-color:var(--red);animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.btn.lk{opacity:.25;pointer-events:none}
.fbA{font-size:11px;padding:8px 10px;border-radius:6px;margin-top:6px;display:none;line-height:1.6}.fbA.vis{display:block}.fbA.pass{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:var(--green)}.fbA.fail{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.12);color:var(--red)}
.res{text-align:center;padding:8px;font-family:'JetBrains Mono',monospace;font-weight:800;color:var(--gold);min-height:24px}

.qz{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin:16px 0}
.qz-tag{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.qz-ctx{font-size:11px;color:var(--t2);padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:8px;line-height:1.6;border:1px solid rgba(255,255,255,.06);border-left:3px solid var(--gold)}
.qz-q{font-size:13px;color:var(--t1);font-weight:600;margin-bottom:8px;line-height:1.5}
.opt{padding:8px 10px;border:1px solid rgba(255,255,255,.06);border-radius:7px;cursor:pointer;font-size:12px;color:var(--t2);transition:all 150ms cubic-bezier(.2,0,0,1);display:flex;gap:8px;align-items:center;margin-bottom:4px}
.opt:hover{border-color:rgba(255,255,255,.1);color:var(--t1)}
.ol{width:18px;height:18px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.opt.right{border-color:var(--green);background:rgba(34,197,94,.05);color:var(--green)}.opt.right .ol{background:var(--green);border-color:var(--green);color:#fff}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,.03);color:var(--red);opacity:.5}.opt.done{pointer-events:none}
.qfb{margin-top:6px;padding:8px 10px;border-radius:6px;font-size:11px;line-height:1.6;display:none}.qfb.vis{display:block}.qfb.pass{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);color:var(--green)}.qfb.fail{background:rgba(239,68,68,.05);border:1px solid rgba(239,68,68,.12);color:var(--red)}

.trap{background:var(--bg2);border:1px solid rgba(239,68,68,.1);border-left:3px solid var(--red);border-radius:8px;padding:10px 12px;margin:5px 0}
.trap-h{font-size:11px;font-weight:700;color:var(--red);margin-bottom:3px}.trap-p{font-size:10px;color:var(--t2);line-height:1.6;margin-bottom:3px}.trap-fix{font-size:10px;color:var(--green);font-weight:600}

.dnd-zone{min-height:50px;padding:4px;border-radius:8px}
.dnd-item{padding:8px 12px;margin:3px 0;border-radius:7px;border:1px solid rgba(255,255,255,.06);background:var(--bg3);color:var(--t2);font-weight:700;font-size:11px;cursor:grab;display:flex;align-items:center;gap:8px;transition:all 150ms cubic-bezier(.2,0,0,1);user-select:none;-webkit-user-select:none;touch-action:none}
.dnd-item:active{cursor:grabbing}.dnd-item.dragging{opacity:.4;border-color:var(--gold)}
.dnd-item .dnd-h{color:var(--t3);font-size:14px;flex-shrink:0}
.dnd-item.correct{border-color:var(--green);background:rgba(34,197,94,.06);color:var(--green)}
.dnd-item.wrong{border-color:var(--red);background:rgba(239,68,68,.04);color:var(--red)}

.mockup{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px;margin:8px 0}
.mockup-t{font-size:10px;color:var(--t3);font-weight:600;margin-bottom:8px;text-transform:uppercase}
.mk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:11px}.mk-row:last-child{border-bottom:none}
.mk-l{color:var(--t3);width:70px;flex-shrink:0;font-weight:600;font-size:10px;text-transform:uppercase}
.mk-v{color:var(--t1);font-weight:700;flex:1}
.mk-v.clk{cursor:pointer;padding:3px 6px;border-radius:5px;border:1px solid transparent;transition:all 150ms cubic-bezier(.2,0,0,1)}
.mk-v.clk:hover{border-color:rgba(255,255,255,.1)}
.mk-v.found{border-color:var(--red)!important;background:rgba(239,68,68,.06)!important;color:var(--red);text-decoration:line-through}
.mk-v.clean{border-color:var(--green)!important;background:rgba(34,197,94,.06)!important;color:var(--green)}

.calc-mock{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin:8px 0;text-align:center}
.calc-sl-btns{display:flex;gap:4px;justify-content:center;margin:6px 0}
.calc-sl-btn{padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.06);background:var(--bg4);color:var(--t2);font-weight:700;font-size:11px;cursor:pointer;transition:all 150ms cubic-bezier(.2,0,0,1);font-family:'JetBrains Mono',monospace}
.calc-sl-btn:hover{border-color:rgba(255,255,255,.1)}.calc-sl-btn.on{border-color:var(--gold);background:rgba(201,162,39,.1);color:var(--gold)}
.calc-lot{font-size:40px;font-weight:800;color:var(--gold);font-family:'JetBrains Mono',monospace;margin:10px 0;cursor:pointer}

.strip{display:flex;gap:2px;justify-content:center;margin:8px 0;background:var(--bg3);border-radius:8px;padding:6px 4px}

<script>
/* ═══ AurumDB — IndexedDB wrapper with localStorage fallback ═══ */
var AurumDB = (function() {
  var DB_NAME = 'AurumData';
  var DB_VERSION = 1;
  var STORE = 'kv';
  var _db = null;
  var _ready = false;
  var _cache = {};

  function open() {
    return new Promise(function(resolve, reject) {
      if (_db) { resolve(_db); return; }
      try {
        var req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = function(e) {
          var db = e.target.result;
          if (!db.objectStoreNames.contains(STORE)) {
            db.createObjectStore(STORE);
          }
        };
        req.onsuccess = function(e) {
          _db = e.target.result;
          resolve(_db);
        };
        req.onerror = function() { reject(req.error); };
      } catch(e) { reject(e); }
    });
  }

  function idbGet(key) {
    return open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(STORE, 'readonly');
        var req = tx.objectStore(STORE).get(key);
        req.onsuccess = function() { resolve(req.result !== undefined ? req.result : null); };
        req.onerror = function() { reject(req.error); };
      });
    });
  }

  function idbSet(key, value) {
    _cache[key] = value;
    return open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(value, key);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    });
  }

  function idbRemove(key) {
    delete _cache[key];
    return open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(key);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(tx.error); };
      });
    });
  }

  function idbGetAll() {
    return open().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(STORE, 'readonly');
        var store = tx.objectStore(STORE);
        var allKeys = store.getAllKeys();
        var allVals = store.getAll();
        tx.oncomplete = function() {
          var result = {};
          for (var i = 0; i < allKeys.result.length; i++) {
            result[allKeys.result[i]] = allVals.result[i];
          }
          resolve(result);
        };
        tx.onerror = function() { reject(tx.error); };
      });
    });
  }

  function migrate() {
    return open().then(function(db) {
      return new Promise(function(resolve) {
        var tx = db.transaction(STORE, 'readonly');
        var countReq = tx.objectStore(STORE).count();
        countReq.onsuccess = function() {
          if (countReq.result > 0) { resolve(false); return; }
          var keys = ['enz_v4','aurum_formation_v1','aurum_capital_v1','aurum_code','aurum_setup','aurum_streak','aurum_backup_journal','aurum_backup_capital','aurum_checklist','aurum_ff_news','aurum_gold_price','enz_stats','enz_lastBackup','aurum_draft_trade','aurum_sessions'];
          var promises = [];
          keys.forEach(function(k) {
            var val = AurumDB.getItem(k);
            if (val !== null) {
              _cache[k] = val;
              promises.push(idbSet(k, val));
            }
          });
          /* Also migrate any enz_milestones_* keys */
          try {
            for (var i = 0; i < localStorage.length; i++) {
              var lk = localStorage.key(i);
              if (lk && lk.indexOf('enz_milestones') === 0) {
                var v = AurumDB.getItem(lk);
                if (v !== null) { _cache[lk] = v; promises.push(idbSet(lk, v)); }
              }
            }
          } catch(e) {}
          Promise.all(promises).then(function() {
            console.log('[AurumDB] Migrated ' + promises.length + ' keys from localStorage to IndexedDB');
            resolve(true);
          }).catch(function() { resolve(false); });
        };
      });
    });
  }

  function loadCache() {
    return idbGetAll().then(function(all) {
      Object.keys(all).forEach(function(k) { _cache[k] = all[k]; });
      _ready = true;
      return all;
    });
  }

  function init() {
    return open()
      .then(function() { return migrate(); })
      .then(function() { return loadCache(); })
      .catch(function(e) {
        console.warn('[AurumDB] IndexedDB failed, using localStorage fallback:', e);
        _ready = true;
        return {};
      });
  }

  return {
    init: init,
    getItem: function(key) {
      if (_cache[key] !== undefined) return _cache[key];
      return AurumDB.getItem(key);
    },
    setItem: function(key, value) {
      _cache[key] = value;
      try { AurumDB.setItem(key, value); } catch(e) {}
      idbSet(key, value).catch(function(e) {
        console.warn('[AurumDB] Write failed for', key, e);
      });
    },
    removeItem: function(key) {
      delete _cache[key];
      try { AurumDB.removeItem(key); } catch(e) {}
      idbRemove(key).catch(function() {});
    },
    getAllData: function() {
      return idbGetAll();
    },
    keys: function() {
      return Object.keys(_cache);
    },
    isReady: function() { return _ready; }
  };
})();

// ========== M1: BOUGIES ==========
{id:"m1",t:"Les bougies japonaises",s:"Fondamentaux",ic:"🕯",ls:[
{id:"m1l1",t:"Anatomie d'une bougie",b:[
{t:"tx",v:"Chaque bougie représente une période de temps et contient 4 données : <strong>ouverture</strong>, <strong>clôture</strong>, <strong>plus haut</strong> (mèche haute), <strong>plus bas</strong> (mèche basse)."},
{t:"dg",svg:`<svg viewBox="0 0 580 240"><text x="145" y="16" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">HAUSSIÈRE</text>${gC(145,30,52,162,205)}<text x="105" y="60" text-anchor="end" fill="#22c55e" font-size="9.5" font-weight="600">Clôture →</text><text x="105" y="168" text-anchor="end" fill="#22c55e" font-size="9.5" font-weight="600">Ouverture →</text><text x="145" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="700">CORPS</text><text x="435" y="16" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">BAISSIÈRE</text>${rC(435,30,52,162,205)}<text x="395" y="60" text-anchor="end" fill="#ef4444" font-size="9.5" font-weight="600">Ouverture →</text><text x="395" y="168" text-anchor="end" fill="#ef4444" font-size="9.5" font-weight="600">Clôture →</text><text x="435" y="112" text-anchor="middle" fill="white" font-size="10" font-weight="700">CORPS</text></svg>`,c:"Haussière (verte) : ouverture en bas, clôture en haut. Baissière (rouge) : inversé."},
{t:"kp",v:"Une bougie ouvre TOUJOURS à la clôture de la précédente.\nLa couleur indique le sens : verte = prix monté, rouge = prix descendu.\nLes mèches = extrêmes atteints. Le corps = écart ouverture/clôture."},
{t:"ix",id:"e1a",ins:"Identifie la bougie haussière :",svg:`<svg viewBox="0 0 340 150"><g class="co" data-answer="wrong" onclick="cI(this)">${rC(70,18,36,108,138)}<text x="70" y="148" text-anchor="middle" fill="#64748b" font-size="10">A</text></g><g class="co" data-answer="correct" onclick="cI(this)">${gC(180,28,48,118,142)}<text x="180" y="148" text-anchor="middle" fill="#64748b" font-size="10">B</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${rC(280,22,40,95,128)}<text x="280" y="148" text-anchor="middle" fill="#64748b" font-size="10">C</text></g></svg>`,ok:"B — verte, le prix a monté.",ko:"B est la haussière (verte). A et C sont baissières (rouges)."},
{t:"ix",id:"e1b",ins:"Sur cette bougie verte, où se situe la clôture ?",svg:`<svg viewBox="0 0 240 170">${gC(120,18,42,120,155,28)}<g class="co" data-answer="correct" onclick="cI(this)"><circle cx="120" cy="42" r="12" fill="transparent" stroke="rgba(201,162,39,.3)" stroke-width="1.5"/><text x="160" y="46" fill="#94a3b8" font-size="10">A — Haut du corps</text></g><g class="co" data-answer="wrong" onclick="cI(this)"><circle cx="120" cy="120" r="12" fill="transparent" stroke="rgba(201,162,39,.3)" stroke-width="1.5"/><text x="160" y="124" fill="#94a3b8" font-size="10">B — Bas du corps</text></g></svg>`,ok:"A — sur une haussière, la clôture est en haut du corps.",ko:"Sur une haussière (verte), clôture = HAUT du corps (A)."}
]},
{id:"m1l2",t:"Instrument et timeframes",b:[
{t:"tx",v:"Cette stratégie s'applique exclusivement au <strong>XAUUSD</strong> (or/dollar). Si le prix affiche 4700, une once d'or vaut 4700 $."},
{t:"kp",v:"Deux timeframes uniquement :\n• 5 MINUTES — direction du marché + identification des liquidités\n• 1 MINUTE — confirmation d'entrée (pattern Quasimodo)\n\nAucun autre timeframe n'est utilisé. Pas de 15 min, pas de 1h, pas de daily."},
{t:"ix",id:"e1c",ins:"Le 5 minutes sert à :",svg:`<svg viewBox="0 0 380 50"><g class="co ob" data-answer="correct" onclick="cI(this)" style="padding:6px 12px;border-radius:5px;border:1.5px solid #1d2840;background:#0c1018;font-size:10px;color:#cbd5e1;display:inline-flex;position:absolute;left:10px;top:5px">Direction + Liquidité</g><g class="co ob" data-answer="wrong" onclick="cI(this)" style="padding:6px 12px;border-radius:5px;border:1.5px solid #1d2840;background:#0c1018;font-size:10px;color:#cbd5e1;display:inline-flex;position:absolute;left:200px;top:5px">Confirmation d'entrée</g></svg>`,ok:"5 min = direction + liquidité.",ko:"5 min = direction + liquidité. La confirmation c'est le 1 min."}
]}
],q:[
{q:"Le corps d'une bougie représente l'écart entre...",o:["Le plus haut et le plus bas","L'ouverture et la clôture","Le volume et le prix"],a:1},
{q:"v",vs:`<svg viewBox="0 0 140 110">${rC(70,8,24,76,100,24)}</svg>`,qt:"Type de cette bougie :",o:["Haussière","Baissière"],a:1},
{q:"v",vs:`<svg viewBox="0 0 140 110">${gC(70,10,28,80,102,24)}</svg>`,qt:"Où se trouve l'ouverture ?",o:["Haut du corps","Bas du corps","Haut de la mèche"],a:1},
{q:"v",vs:`<svg viewBox="0 0 140 110">${rC(70,8,24,76,100,24)}</svg>`,qt:"Où se trouve l'ouverture ?",o:["Haut du corps","Bas du corps","Bas de la mèche"],a:0},
{q:"Une bougie ouvre toujours...",o:["À l'ouverture de la précédente","À la clôture de la précédente","Au point le plus haut"],a:1},
{q:"Timeframes de la stratégie :",o:["1 min + 15 min","5 min + 1 min","5 min + 1h"],a:1},
{q:"Le 1 minute sert à...",o:["Lire la direction","Identifier les liquidités","Confirmer l'entrée"],a:2},
{q:"Instrument tradé :",o:["EUR/USD","XAUUSD","BTC/USD","S&P 500"],a:1},
{q:"v",vs:`<svg viewBox="0 0 280 100">${gC(55,10,22,60,88,18)}<text x="55" y="98" text-anchor="middle" fill="#64748b" font-size="9">A</text>${rC(140,14,28,68,85,18)}<text x="140" y="98" text-anchor="middle" fill="#64748b" font-size="9">B</text>${gC(225,6,18,72,92,18)}<text x="225" y="98" text-anchor="middle" fill="#64748b" font-size="9">C</text></svg>`,qt:"Quelle bougie a le plus grand corps ?",o:["A","B","C"],a:2},
{q:"Une bougie verte avec une très longue mèche haute est-elle haussière ?",o:["Non, la mèche change le type","Oui, seule la couleur du corps détermine le type"],a:1}
]},

// ========== M2: S/R ==========
{id:"m2",t:"Supports & Résistances",s:"Niveaux clés",ic:"📐",ls:[
{id:"m2l1",t:"Support et résistance",b:[
{t:"kp",v:"SUPPORT = bougie BAISSIÈRE puis HAUSSIÈRE. Niveau = clôture de la baissière.\nRÉSISTANCE = bougie HAUSSIÈRE puis BAISSIÈRE. Niveau = clôture de la haussière.\nValidés à la clôture de la 2ème bougie."},
{t:"dg",svg:`<svg viewBox="0 0 540 170"><text x="135" y="14" text-anchor="middle" fill="#3b82f6" font-size="11" font-weight="600">SUPPORT</text>${rC(95,16,30,88,112,18)}${gC(175,25,45,86,105,18)}<line x1="65" y1="88" x2="215" y2="88" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4 3"/><text x="230" y="91" fill="#3b82f6" font-size="8.5">clôture baissière</text><text x="395" y="14" text-anchor="middle" fill="#c9a227" font-size="11" font-weight="600">RÉSISTANCE</text>${gC(355,28,48,115,140,18)}${rC(435,22,40,100,128,18)}<line x1="325" y1="48" x2="475" y2="48" stroke="#c9a227" stroke-width="1.2" stroke-dasharray="4 3"/><text x="490" y="51" fill="#c9a227" font-size="8.5">clôture haussière</text></svg>`,c:"Support = rouge+vert. Résistance = vert+rouge."},
{t:"ix",id:"e2a",ins:"Identifie le SUPPORT valide parmi ces 4 paires :",svg:`<svg viewBox="0 0 500 135"><g class="co" data-answer="wrong" onclick="cI(this)">${gC(35,18,30,65,85,14)}${rC(68,22,35,68,82,14)}<text x="51" y="110" text-anchor="middle" fill="#64748b" font-size="9">A</text></g><g class="co" data-answer="correct" onclick="cI(this)">${rC(150,15,28,72,92,14)}${gC(183,22,40,70,88,14)}<text x="166" y="110" text-anchor="middle" fill="#64748b" font-size="9">B</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${rC(265,18,30,70,88,14)}${rC(298,22,38,75,92,14)}<text x="281" y="110" text-anchor="middle" fill="#64748b" font-size="9">C</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${gC(380,20,32,68,85,14)}${gC(413,18,28,62,80,14)}<text x="396" y="110" text-anchor="middle" fill="#64748b" font-size="9">D</text></g></svg>`,ok:"B — baissière puis haussière. A = résistance, C = deux baissières, D = deux haussières.",ko:"B : rouge puis vert = support. Pas d'autre paire valide."}
]},
{id:"m2l2",t:"Définition de « casser »",b:[
{t:"kp",v:"CASSER = le CORPS d'une bougie CLÔTURE au-delà du niveau.\nLa mèche seule ne suffit JAMAIS.\nCette règle est universelle dans toute la stratégie.\n\nSeule exception : la prise de liquidité (mèche ou corps suffit)."},
{t:"dg",svg:`<svg viewBox="0 0 440 150"><line x1="20" y1="72" x2="220" y2="72" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/><text x="120" y="65" text-anchor="middle" fill="#3b82f6" font-size="8.5">Niveau</text>${rC(65,30,42,65,95,18)}<text x="65" y="115" text-anchor="middle" fill="#94a3b8" font-size="9">Mèche seule</text><text x="65" y="126" text-anchor="middle" fill="#ef4444" font-size="8.5" font-weight="600">PAS cassé</text>${rC(170,28,38,92,118,18)}<text x="170" y="132" text-anchor="middle" fill="#94a3b8" font-size="9">Corps au-delà</text><text x="170" y="143" text-anchor="middle" fill="#22c55e" font-size="8.5" font-weight="600">CASSÉ</text></svg>`,c:"Corps clôture au-delà = cassé. Mèche seule = PAS cassé."},
{t:"ix",id:"e2b",ins:"La mèche dépasse le support de 300 points mais le corps clôture 1 point au-dessus. Le support est-il cassé ?",svg:`<svg viewBox="0 0 260 48"><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:8px;top:5px">Oui, 300 points c'est significatif</g><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:195px;top:5px">Non</g></svg>`,ok:"Non. Peu importe la taille de la mèche : si le corps ne clôture pas au-delà, ce n'est pas cassé.",ko:"Peu importe que la mèche dépasse de 300 ou 3000 points. Seul le CORPS compte."}
]}
],q:[
{q:"Support = quelle séquence ?",o:["Haussière + Baissière","Baissière + Haussière","2 baissières"],a:1},
{q:"Résistance = quelle séquence ?",o:["Haussière + Baissière","Baissière + Haussière","2 haussières"],a:0},
{q:"Niveau du support tracé à...",o:["La mèche la plus basse","La clôture de la baissière","L'ouverture de la haussière"],a:1},
{q:"Niveau de la résistance tracé à...",o:["La mèche la plus haute","La clôture de la haussière","L'ouverture de la baissière"],a:1},
{q:"v",vs:`<svg viewBox="0 0 200 95"><line x1="10" y1="55" x2="190" y2="55" stroke="#3b82f6" stroke-width="1" stroke-dasharray="3 2"/>${rC(60,22,32,50,78,16)}<text x="60" y="90" text-anchor="middle" fill="#64748b" font-size="8.5">A</text>${rC(140,18,28,72,90,16)}<text x="140" y="90" text-anchor="middle" fill="#64748b" font-size="8.5">B</text></svg>`,qt:"Laquelle casse le support ?",o:["A","B","Les deux","Aucune"],a:1},
{q:"Mèche dépasse largement mais corps reste au-dessus. Cassé ?",o:["Oui","Non"],a:1},
{q:"Quand la mèche seule suffit-elle pour dépasser un niveau ?",o:["Pour les supports","Pour les résistances","Uniquement la prise de liquidité","Jamais"],a:2},
{q:"v",vs:`<svg viewBox="0 0 180 90">${gC(45,14,26,65,82,16)}${rC(105,10,22,58,78,16)}</svg>`,qt:"Ce pattern forme...",o:["Un support","Une résistance","Rien de valide"],a:1},
{q:"v",vs:`<svg viewBox="0 0 180 90">${rC(45,12,24,68,85,16)}${gC(105,18,32,65,80,16)}</svg>`,qt:"Ce pattern forme...",o:["Un support","Une résistance","Rien de valide"],a:0},
{q:"v",vs:`<svg viewBox="0 0 180 90">${rC(45,14,26,68,85,16)}${rC(105,18,30,72,88,16)}</svg>`,qt:"Ce pattern forme...",o:["Un support","Une résistance","Ni l'un ni l'autre"],a:2}
]},

// ========== M3: PULLBACKS ==========
{id:"m3",t:"Pullbacks & Direction",s:"Lire la tendance",ic:"📈",ls:[
{id:"m3l1",t:"Pullback valide et changement de direction",b:[
{t:"kp",v:"PULLBACK VALIDE = contient au minimum 2 bougies CONSÉCUTIVES dans le sens opposé à la tendance. Position dans le pullback : indifférente.\n\nFin du pullback = cassure du S/R le plus extrême du pullback."},
{t:"kp",v:"CHANGEMENT DE DIRECTION :\nCorps clôture au-delà de la MÈCHE LA PLUS HAUTE/BASSE des 2 bougies formant la résistance/support du dernier pullback valide le plus proche.\n\nDirection = toujours haussier ou baissier. Jamais neutre.\nSi nouveaux pullbacks → on met à jour le niveau de référence."},
{t:"ix",id:"e3a",ins:"Un pullback contient dans l'ordre : verte, rouge, verte, rouge, verte. Est-il valide ?",svg:`<svg viewBox="0 0 260 42"><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:8px;top:3px">Oui</g><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:80px;top:3px">Non</g></svg>`,ok:"Non. Aucune paire de 2 bougies consécutives de même couleur. Verte-rouge alternent systématiquement.",ko:"Aucune paire consécutive de même couleur : verte-rouge-verte-rouge-verte. Pas valide."},
{t:"ix",id:"e3b",ins:"Un pullback contient : rouge, verte, verte, rouge. Est-il valide ?",svg:`<svg viewBox="0 0 260 42"><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:8px;top:3px">Oui</g><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:80px;top:3px">Non</g></svg>`,ok:"Oui. Positions 2 et 3 = deux vertes consécutives.",ko:"Si : positions 2-3 = deux vertes consécutives → valide."}
]}
],q:[
{q:"Minimum de bougies consécutives pour un pullback valide :",o:["1","2","3"],a:1},
{q:"Les 2 bougies consécutives peuvent être...",o:["Uniquement au début","Uniquement à la fin","N'importe où dans le pullback"],a:2},
{q:"Pullback : rouge, verte, rouge, verte. Valide ?",o:["Oui","Non — aucune paire consécutive"],a:1},
{q:"Pullback : verte, verte, rouge, verte. Valide ?",o:["Oui — 2 vertes consécutives au début","Non"],a:0},
{q:"Pullback : rouge, rouge, verte, rouge, verte, verte. Valide ?",o:["Oui","Non"],a:0},
{q:"Pour passer baissier → haussier, le corps clôture au-dessus de...",o:["La clôture de la résistance","La mèche la plus haute des 2 bougies de la résistance","Le corps de la bougie précédente"],a:1},
{q:"La direction peut-elle être neutre ?",o:["Oui, quand le marché est calme","Non, toujours haussier ou baissier"],a:1},
{q:"Fin du pullback =",o:["Après 10 bougies","Cassure du S/R le plus extrême du pullback","Changement de couleur"],a:1},
{q:"Quel pullback sert de référence pour la direction ?",o:["Le premier formé","Le plus gros","Le dernier valide le plus proche du prix"],a:2},
{q:"Si de nouveaux pullbacks se créent...",o:["On garde l'ancien","On met à jour le niveau de référence"],a:1}
]},

// ========== M4: LIQUIDITÉ ==========
{id:"m4",t:"La Liquidité",s:"Concept central",ic:"💧",ls:[
{id:"m4l1",t:"Formation et identification",b:[
{t:"kp",v:"LIQUIDITÉ = 3 bougies CLÔTURÉES, couleur indifférente.\n\nBaissière : mèche HAUTE de la bougie du milieu STRICTEMENT plus haute que les 2 voisines.\nHaussière : mèche BASSE de la bougie du milieu STRICTEMENT plus basse que les 2 voisines."},
{t:"dg",svg:`<svg viewBox="0 0 520 145"><text x="130" y="12" text-anchor="middle" fill="#c9a227" font-size="10" font-weight="600">BAISSIÈRE</text>${rC(65,42,52,78,95,16)}${gC(130,20,38,75,92,16)}${rC(195,38,48,74,90,16)}<line x1="130" y1="20" x2="225" y2="20" stroke="#c9a227" stroke-width=".8" stroke-dasharray="3 2"/><text x="232" y="23" fill="#c9a227" font-size="7.5">mèche haute milieu = la + haute</text><text x="390" y="12" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="600">HAUSSIÈRE</text>${gC(325,35,48,72,88,16)}${rC(390,38,52,76,102,16)}${gC(455,32,42,70,86,16)}<line x1="390" y1="102" x2="490" y2="102" stroke="#3b82f6" stroke-width=".8" stroke-dasharray="3 2"/><text x="495" y="105" fill="#3b82f6" font-size="7.5">mèche basse milieu = la + basse</text></svg>`,c:"La mèche du MILIEU doit être strictement l'extrême. La couleur des bougies est sans importance."},
{t:"tx",v:"<strong>Exercice :</strong> identifie les formations valides. Attention, certaines se ressemblent mais ne respectent pas les critères."},
{t:"ix",id:"e4a",ins:"Laquelle est une liquidité BAISSIÈRE valide ?",svg:`<svg viewBox="0 0 480 120"><g class="co" data-answer="correct" onclick="cI(this)">${rC(30,35,42,68,85,14)}${gC(60,18,32,65,80,14)}${rC(90,32,40,66,82,14)}<text x="60" y="105" text-anchor="middle" fill="#64748b" font-size="9">A</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${gC(160,22,32,60,78,14)}${rC(190,24,35,62,80,14)}${gC(220,18,28,58,75,14)}<text x="190" y="105" text-anchor="middle" fill="#64748b" font-size="9">B</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${rC(290,22,32,62,80,14)}${gC(320,22,35,60,78,14)}${rC(350,28,38,64,82,14)}<text x="320" y="105" text-anchor="middle" fill="#64748b" font-size="9">C</text></g><g class="co" data-answer="wrong" onclick="cI(this)">${gC(410,30,40,65,80,14)}${rC(440,28,38,62,78,14)}${gC(470,25,35,60,76,14)}<text x="440" y="105" text-anchor="middle" fill="#64748b" font-size="9">D</text></g></svg>`,ok:"A — mèche haute du milieu (18) est strictement la plus haute. B : milieu pas la plus haute (24 vs 22). C : milieu = même hauteur que gauche. D : milieu pas la plus haute.",ko:"A est la seule où la mèche haute du milieu est STRICTEMENT la plus haute des 3."}
]},
{id:"m4l2",t:"Règles d'utilisation",b:[
{t:"kp",v:"• Direction baissière → liquidités baissières (au-dessus du prix)\n• Direction haussière → liquidités haussières (en-dessous)\n• Prise = prix touche/dépasse le niveau — mèche OU corps, PAS besoin de clôture\n• Dès que touchée → passage IMMÉDIAT en 1 min\n• Prise = consommée définitivement\n• Alertes sur toutes les liquidités non prises"},
{t:"kp",v:"FILTRE CRITIQUE : si la bougie 5 min qui prend la liquidité clôture aussi au-delà du niveau de changement de direction → la direction a changé. Aucune confirmation dans l'ancienne direction."},
{t:"ix",id:"e4b",ins:"Tu es baissier. Une liquidité baissière est prise. Mais la même bougie 5 min clôture au-dessus de la mèche du dernier pullback. Tu cherches un QM sell ?",svg:`<svg viewBox="0 0 300 42"><g class="co ob" data-answer="wrong" onclick="cI(this)" style="position:absolute;left:8px;top:3px">Oui, la liquidité est prise</g><g class="co ob" data-answer="correct" onclick="cI(this)" style="position:absolute;left:175px;top:3px">Non, direction changée</g></svg>`,ok:"Non. La direction a changé → pas de confirmation sell. On réévalue en haussier.",ko:"Direction changée en même temps → aucune confirmation dans l'ancienne direction."}
]}
],q:[
{q:"Liquidité = combien de bougies ?",o:["2","3","4"],a:1},
{q:"Couleur des bougies de liquidité :",o:["Toutes vertes","Alternées","Indifférente"],a:2},
{q:"v",vs:`<svg viewBox="0 0 200 85">${rC(35,22,32,58,72,14)}${gC(80,15,28,55,68,14)}${rC(125,20,30,56,70,14)}</svg>`,qt:"Liquidité baissière valide ?",o:["Oui — mèche haute milieu la + haute","Non — mèche haute milieu pas la + haute"],a:1},
{q:"v",vs:`<svg viewBox="0 0 200 85">${gC(35,18,28,55,70,14)}${rC(80,20,30,58,70,14)}${gC(125,15,25,52,68,14)}</svg>`,qt:"Liquidité baissière valide ?",o:["Oui","Non — mèche haute milieu (20) n'est pas la plus haute (gauche=18, droite=15, milieu=20... en fait 20>18 et 20>15)"],a:0},
{q:"v",vs:`<svg viewBox="0 0 200 85">${rC(35,18,28,55,70,14)}${gC(80,18,30,58,72,14)}${rC(125,22,32,56,70,14)}</svg>`,qt:"Liquidité baissière valide ?",o:["Oui","Non — mèche haute milieu = même que gauche, pas strictement plus haute"],a:1},
{q:"Prise de liquidité nécessite :",o:["Clôture au-delà","Toucher/dépasser (mèche suffit)","2 bougies au-delà"],a:1},
{q:"Direction baissière → on cherche les liquidités...",o:["Baissières (au-dessus)","Haussières (en-dessous)"],a:0},

{id:"m11",t:"Compilation : Tout assembler",s:"Journée type",ic:"🎯",ls:[

{t:"tx",v:"Voici exactement ce que tu fais, étape par étape, du réveil au coucher. Chaque décision est mécanique."},
{t:"kp",v:"AVANT LE MARCHÉ :\n1. Forex Factory → news rouges USD du jour (heures exactes)\n2. TradingView 5 min → direction actuelle (dernier pullback valide)\n3. Identifier les liquidités non prises (alertes posées)\n4. Tableau de lots prêt (calculateur Aurum)\n5. Checklist ouverte dans Aurum\n\nRègle : si une étape manque → PAS DE TRADING."},
{t:"kp",v:"PENDANT LE MARCHÉ :\n1. Alerte liquidité touche → passage IMMÉDIAT en 1 min\n2. Vérifier : direction 5 min toujours valide ?\n3. Chercher le QM sur 1 min (ou Gaps si écart > 1200 pts)\n4. QM confirmé → entrée à la clôture de la dernière cassure\n5. SL + TP placés IMMÉDIATEMENT (pas après, pas plus tard)\n6. Trailing actif : surveiller les retracements 1 min\n7. NE TOUCHE PLUS. Laisse le trade vivre.\n\nMax 4 trades/jour. 1 seul à la fois."},
{t:"kp",v:"APRÈS CHAQUE TRADE :\n1. Journal rempli IMMÉDIATEMENT (pas ce soir, pas demain)\n2. 3 screenshots : 5 min contexte, 1 min entrée, résultat\n3. Checklist cochée\n4. Si perte -4% jour → FIN. Si gain +8% → FIN.\n\nAPRÈS LA SESSION :\n- Revoir les trades dans le dashboard\n- Vendredi : review hebdo + backup JSON"}
]},
{id:"m11l2",t:"Cas concret : Trade BUY complet",b:[
{t:"tx",v:"<strong>Situation</strong> : Mardi 10h. Tu es devant TradingView. XAUUSD à 2 350$."},
{t:"kp",v:"ÉTAPE 1 — Direction (5 min)\nDernier pullback valide : support formé par [rouge + verte] à 2 340$.\nLe prix a cassé la résistance au-dessus → direction HAUSSIÈRE confirmée."},
{t:"kp",v:"ÉTAPE 2 — Liquidité (5 min)\nTu identifies une liquidité haussière à 2 345$ (3 bougies, mèche basse milieu la plus basse).\nAlerte posée à 2 345$."},
{t:"kp",v:"ÉTAPE 3 — Prise de liquidité\n10h12 : le prix descend et TOUCHE 2 345$ (mèche suffit).\n→ Passage IMMÉDIAT en 1 minute.\nVérification : la bougie 5 min ne clôture PAS sous le niveau de changement de direction → OK."},
{t:"kp",v:"ÉTAPE 4 — QM haussier (1 min)\nSur le 1 min, tu vois un W se former :\n1. Support à 2 344.50$\n2. Résistance à 2 346$\n3. Nouveau plus bas à 2 344$ (pointe droite plus basse = W valide)\n4. Le prix casse la résistance à 2 346$ → ENTRÉE BUY à la clôture."},
{t:"kp",v:"ÉTAPE 5 — Gestion\nSL = mèche extrême du QM (2 343.50$) + 50 pts = 2 343$\nDistance SL = 300 pts (3$). TP = 2× = 600 pts → TP à 2 352$.\nLot : calculateur Aurum → 6000$ × 1% ÷ 300 pts = 0.20 lot."},
{t:"kp",v:"ÉTAPE 6 — Trailing\n10h25 : retracement valide sur 1 min (2 bougies rouges consécutives) → cassé.\nTrail SL derrière mèche extrême + 40 pts → nouveau SL à 2 347$.\nMême si le SL touche maintenant, perte = 100 pts au lieu de 300 = 0.33R, pas 1R."},
{t:"kp",v:"RÉSULTAT : TP touché à 2 352$.\nP&L = +600 pts × 0.20 = +$120 (+2%).\nTrade enregistré dans Aurum. Screenshot pris. Checklist cochée.\n\nTemps total : 25 minutes du signal au TP."}
]},
{id:"m11l3",t:"Cas concret : SELL + trailing + 21h",b:[
{t:"tx",v:"<strong>Situation</strong> : Jeudi 15h30. Direction baissière confirmée en 5 min."},
{t:"kp",v:"Liquidité baissière prise à 2 380$. QM baissier sur 1 min (M : pointe droite plus haute).\nEntrée SELL à 2 379$. SL = 2 381$ (200 pts + 50 = 250 pts minimum). TP = 2 374$ (500 pts)."},
{t:"kp",v:"16h00 : trailing activé → SL ramené à 2 378$ (150 pts de perte max au lieu de 250).\n17h30 : nouveau trail → SL à 2 376$ (le trade est en profit de 300 pts).\n20h45 : le prix est à 2 375.50$ mais n'a pas touché le TP.\n\n21h00 : FERMETURE OBLIGATOIRE. Tu fermes à 2 375.50$.\nP&L = 350 pts au lieu de 500 visés. C'est un trade 21h, pas un TP.\nDans le Journal : résultat = 21h, P&L réel = 350 pts. R réel = 350/250 = 1.4R."},
{t:"kp",v:"CE QU'IL NE FAUT PAS FAIRE :\n✗ Garder le trade overnight (règle violée = fin de journée demain)\n✗ Déplacer le TP pour 'prendre le profit' plus tôt\n✗ Couper manuellement à +200 pts par peur\n✗ Oublier d'enregistrer le trade (données faussées)"}
]},
{id:"m11l4",t:"Cas concret : trade annulé",b:[
{t:"tx",v:"<strong>Situation</strong> : Mercredi 14h55. Setup parfait en vue."},

]}

var TOTAL_MODS = ALL_MODS.length;

/* ═══ STATE ═══ */
var S = {c:-1, d:[], a:{}, el:0, ev:'l', ea:{}, es:0};
var _showLanding = false;
function sv(){try{AurumDB.setItem('aurum_formation_v1',JSON.stringify(S))}catch(e){}}
function ld(){try{var r=JSON.parse(AurumDB.getItem('aurum_formation_v1'));if(r){S.c=(typeof r.c==='number')?r.c:-1;S.d=r.d||[];S.a=r.a||{}}}catch(e){}}

/* Scoring */
function att(i){if(!S.a[i])S.a[i]=0;S.a[i]++;sv()}
function stars(i){var a=S.a[i]||99;return a<=1?3:a<=2?2:1}
function totalStars(){var t=0;S.d.forEach(function(i){t+=stars(i)});return t}
function maxStars(){return TOTAL_MODS*3}

function markDone(i){if(S.d.indexOf(i)===-1){S.d.push(i);sv();drawNav();drawProg();doConfetti()}}

/* ═══ NAVIGATION ═══ */
function goMod(i){
  if(i>0 && S.d.indexOf(i-1)===-1){alert('Complète "'+ALL_MODS[i-1].t+'" d\'abord.');return}
  _showLanding=false;S.c=i;S.el=0;S.ev='l';S.ea={};S.es=0;sv();render();drawNav();
  document.querySelector('.main').scrollTo({top:0,behavior:'smooth'});
}

/* Time estimates per module (minutes) */
var MOD_TIME=[4,3,3,4,3,4,3,3,3,3,3,5,5,2,3,4,3,3,3,3,3,3,3,3,5,2,3,3,3,3,3,3];

function resumeNext(){
  try{
  _showLanding=false;
  /* Find first non-completed module */
  for(var i=0;i<TOTAL_MODS;i++){
    if(S.d.indexOf(i)===-1){goMod(i);return}
  }
  /* All done */
  goMod(TOTAL_MODS-1);
  }catch(e){console.error('resumeNext:',e)}
}

function drawNav(){
  try{
  /* Landing link at top */
  var h='<div class="mi" onclick="showLanding()" style="margin-bottom:4px;border-left:3px solid '+(S.c===-1||_showLanding?'var(--gold)':'transparent')+'"><div class="mn" style="background:var(--gold);border-color:var(--gold);color:#000;font-size:10px">A</div><div style="flex:1"><div style="font-weight:700;font-size:10px;color:'+(S.c===-1||_showLanding?'var(--gold)':'var(--t2)')+'">Accueil</div></div></div>';

  /* Part definitions */
  var partDefs=[
    {key:'strategy',label:'Partie 1 · Stratégie',color:'var(--blue)',start:0,count:EDGE_M.length},
    {key:'app',label:'Partie 2 · Application',color:'var(--green)',start:EDGE_M.length,count:APP_NAMES.length},
    {key:'capital',label:'Partie 3 · Capital',color:'var(--purple)',start:EDGE_M.length+APP_NAMES.length,count:CAP_NAMES.length}
  ];

  partDefs.forEach(function(pd){
    /* Count done in this part */
    var done=0;
    for(var j=pd.start;j<pd.start+pd.count;j++){if(S.d.indexOf(j)>=0)done++}
    var pct=pd.count>0?Math.round(done/pd.count*100):0;

    /* Part header with progress */
    h+='<div class="nav-part-hd">';
    h+='<div class="nav-part-label" style="color:'+pd.color+'">'+pd.label+' <span class="nav-part-count">'+done+'/'+pd.count+'</span></div>';
    h+='<div class="nav-part-bar"><div class="nav-part-bar-fill" style="width:'+pct+'%;background:'+pd.color+'"></div></div>';
    h+='</div>';

    /* Modules in this part */
    for(var j=pd.start;j<pd.start+pd.count;j++){
      var m=ALL_MODS[j];
      var isDone=S.d.indexOf(j)>=0;
      var isUnlocked=(j===0)||(S.d.indexOf(j-1)>=0);
      var ac=j===S.c&&!_showLanding?' ac':'',dn=isDone?' dn':'',lk=(!isUnlocked&&!isDone)?' lk':'';
      var icon=isDone?'✓':(!isUnlocked&&!isDone)?'🔒':m.icon||String(j+1);
      var st=isDone?'<span class="mi-s">'+'★'.repeat(stars(j))+'☆'.repeat(3-stars(j))+'</span>':'';
      var time=MOD_TIME[j]||3;
      h+='<div class="mi'+ac+dn+lk+'" onclick="goMod('+j+')"><div class="mn">'+icon+'</div><div style="flex:1"><div style="font-weight:600;font-size:10px">'+m.t+'</div><div style="font-size:10px;color:var(--t3)">~'+time+' min</div></div>'+st+'</div>';

      /* Insert sandbox button after last Edge module */
      if(j===EDGE_M.length-1 && S.d.indexOf(EDGE_M.length-1)>=0){
        var sbAc=(S.c===EDGE_M.length && !(_sandboxState&&_sandboxState.active))?' ac':'';
        h+='<div class="mi dn'+sbAc+'" onclick="S.c='+EDGE_M.length+';_sandboxState=null;render();drawNav()" style="border-left:2px solid var(--gold)"><div class="mn">🎯</div><div style="flex:1"><div style="font-weight:600;font-size:10px">Entraînement libre</div><div style="font-size:10px;color:var(--t3)">Pratique sandbox</div></div></div>';
      }
    }
  });

  document.getElementById('nav').innerHTML=h;
  }catch(e){console.error('drawNav:',e)}
}

function drawProg(){
  var p=Math.round(S.d.length/TOTAL_MODS*100);
  document.getElementById('pF').style.width=p+'%';
  document.getElementById('pL').textContent=S.d.length+'/'+TOTAL_MODS;
  document.getElementById('sT').innerHTML='★ '+totalStars()+'/'+maxStars();
}

/* ═══ LANDING PAGE ═══ */
function showLanding(){
  try{
    _showLanding=true;
    render();
    drawNav();
  }catch(e){console.error('showLanding:',e)}
}

/* ═══ PART TRANSITION: App → Capital ═══ */

function capTime(){
  try{
    var t=0;
    for(var i=EDGE_M.length+APP_NAMES.length;i<TOTAL_MODS;i++){t+=(MOD_TIME[i]||3)}
    return t;
  }catch(e){return 24}
}

  if (S.c === -1 || _showLanding) {

    rSandboxChart(document.getElementById('ct'));
    return;
  }

  var mod=ALL_MODS[S.c];
  if(!mod) return;

  /* Écran formation terminée si tous modules complétés */
  if(S.d.length>=TOTAL_MODS){
    var ct=document.getElementById('ct');
    if(ct){
      var ts=totalStars(),ms=maxStars(),pct=Math.round(ts/ms*100);
      ct.innerHTML='<div style="text-align:center;padding:40px 20px;max-width:500px;margin:0 auto">'+
        '<div style="font-size:48px;margin-bottom:16px">🏆</div>'+

        '<div style="background:var(--bg3);padding:14px 20px;border-radius:12px;text-align:center"><div style="font-size:24px;font-weight:800;font-family:JetBrains Mono,monospace;color:var(--green)">'+pct+'%</div><div style="font-size:10px;color:var(--t3)">excellence</div></div>'+
        '<div style="background:var(--bg3);padding:14px 20px;border-radius:12px;text-align:center"><div style="font-size:24px;font-weight:800;font-family:JetBrains Mono,monospace;color:var(--purple)">'+TOTAL_MODS+'</div><div style="font-size:10px;color:var(--t3)">modules</div></div>'+
        '</div>'+
        '<div style="font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.6">La prochaine étape : <b style="color:var(--t1)">ouvre le Journal</b> et enregistre ton premier trade avec la checklist.</div>'+
        '<a href="Aurum.html" style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,var(--gold3),var(--gold));color:#000;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none;transition:all .2s">Ouvrir le Journal →</a>'+
        '<div style="margin-top:16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+
        '<button onclick="goMod(0)" style="background:none;border:1px solid var(--brd2);color:var(--t3);padding:8px 16px;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer">Revoir les modules</button>'+
        '<button onclick="S.c='+EDGE_M.length+';render();drawNav()" style="background:none;border:1px solid var(--brd2);color:var(--t3);padding:8px 16px;border-radius:8px;font-family:inherit;font-size:11px;cursor:pointer">🎯 Entraînement libre</button>'+
        '</div>'+
        '</div>';
    }
    return;
  }

  /* Intermediate screen: Edge complete, before Part 2 */
  if (S.c === EDGE_M.length && S.d.indexOf(EDGE_M.length - 1) !== -1) {
    renderEdgeComplete();
    drawNav();
    return;
  }

  /* Intermediate screen: App complete, before Part 3 */
  var appLastIdx = EDGE_M.length + APP_NAMES.length - 1;
  if (S.c === EDGE_M.length + APP_NAMES.length && S.d.indexOf(appLastIdx) !== -1 && S.d.indexOf(EDGE_M.length + APP_NAMES.length) === -1) {
    renderAppComplete();
    drawNav();
    return;
  }

  if(mod.engine==='edge') renderEdge(mod.edgeIdx);
  else if(mod.engine==='academy') renderAcademy(mod.acadIdx);
  else if(mod.engine==='capital') renderCapital(mod.capIdx);
  /* Mobile nav update */
  try{
    var t=document.getElementById('mobModTitle');
    var n=document.getElementById('mobModNum');
    if(t) t.textContent=mod.t||'';
    if(n) n.textContent='Module '+(S.c+1)+'/'+TOTAL_MODS;

  }catch(e){console.error('render:',e)}

function renderEdge(mi){

  else if(!S.es) rEdgeQuiz(m,mi);
  else rEdgeResult(m,mi);
}

        if(btns)svgH='<div style="display:flex;gap:8px;margin:8px 0">'+btns+'</div>';

  }).join('');

function edgeNext(){
  var m=EDGE_M[ALL_MODS[S.c].edgeIdx];
  if(S.el<m.ls.length-1){S.el++;render()}
  else{S.ev='q';S.ea={};S.es=0;render()}
}

function rEdgeQuiz(m,mi){
  var qz=m.q;
  var qs=qz.map(function(q,i){
    var vis='',qt=q.q;
    if(q.q==='v'){vis='<div class="qv">'+q.vs+'</div>';qt=q.qt}

    return'<div class="qb"><div class="qt2"><span class="qn">'+(i+1)+'.</span>'+qt+'</div>'+vis+'<div class="qo">'+os+'</div></div>'
  }).join('');

  document.getElementById('ct').innerHTML='<div class="md vis"><div style="font-size:10px;color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:1.5px">Module '+(S.c+1)+'</div><div class="mt">'+m.ic+' '+m.t+'</div><div class="qh"><h3>Contrôle</h3><p>'+qz.length+' questions — Seuil : '+PASS+'%</p></div>'+qs+'<button class="bt '+(all?'byy':'bgg')+'" style="width:100%;padding:10px" '+(all?'':'disabled')+' onclick="edgeSubmit()">Valider</button></div>';
}

function edgePick(q,a){if(S.es)return;S.ea[q]=a;render()}

function edgeSubmit(){
  var m=EDGE_M[ALL_MODS[S.c].edgeIdx];
  var qz=m.q,sc=0;
  qz.forEach(function(q,i){if(S.ea[i]===q.a)sc++});
  S.es=Math.round(sc/qz.length*100);
  if(S.es>=PASS){att(S.c);markDone(S.c)}else{att(S.c)}
  render();
}

function rEdgeResult(m,mi){
  var qz=m.q,ps=S.es>=PASS;
  var cs=qz.map(function(q,i){
    var cr=S.ea[i]===q.a,qt=q.q==='v'?q.qt:q.q,vis=q.q==='v'?'<div class="qv">'+q.vs+'</div>':'';
    var os=q.o.map(function(o,j){
      var c='qi lk';if(j===q.a)c+=' cr';else if(j===S.ea[i]&&!cr)c+=' wr';
      return'<div class="'+c+'"><span class="le">'+String.fromCharCode(65+j)+'</span>'+o+(j===q.a?'<span style="margin-left:4px;color:var(--green);font-size:8px">✓</span>':'')+'</div>'
    }).join('');
    return'<div class="qb"><div class="qt2"><span style="color:'+(cr?'var(--green)':'var(--red)')+';margin-right:4px">'+(cr?'✓':'✗')+'</span>'+qt+'</div>'+vis+'<div class="qo">'+os+'</div></div>'
  }).join('');
  var bs='';
  if(!ps)bs+='<button class="bt byy" style="flex:1" onclick="S.ea={};S.es=0;render()">Réessayer</button>';
  if(ps&&S.c<TOTAL_MODS-1)bs+='<button class="bt byy" style="flex:1" onclick="goMod('+(S.c+1)+')">Module suivant →</button>';
  bs+='<button class="bt bgg" style="flex:1" onclick="S.ev=\'l\';S.el=0;render()">Revoir</button>';
  document.getElementById('ct').innerHTML='<div class="md vis"><div style="font-size:10px;color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:1.5px">Module '+(S.c+1)+'</div><div class="mt">'+m.ic+' '+m.t+'</div><div class="rb '+(ps?'ps':'fl')+'"><div class="rs" style="color:'+(ps?'var(--green)':'var(--red)')+'">'+S.es+'%</div><div class="rl">'+(ps?'Module validé ★'+stars(S.c):'Insuffisant — '+PASS+'% requis')+'</div></div>'+cs+'<div class="br">'+bs+'</div></div>';
}

 var fb=q.querySelector(".qfb");fb.classList.add("vis");
 if(ok){fb.className="qfb vis pass";fb.textContent="\u2713 Correct ! "+"\u2605".repeat(stars(mi));smartMark(mi)}

// DND
window._initDnD=function(){
 var zone=document.getElementById("dnd-zone");if(!zone)return;
 var dragged=null;
 function gi(el){var ch=zone.children;for(var i=0;i<ch.length;i++)if(ch[i]===el)return i;return -1}
 function onS(e){dragged=e.currentTarget;dragged.classList.add("dragging");e.preventDefault()}
 function onM(e){if(!dragged)return;e.preventDefault();var t=e.touches?e.touches[0]:e;var ch=zone.children;
  for(var i=0;i<ch.length;i++){if(ch[i]===dragged)continue;var r=ch[i].getBoundingClientRect(),mid=r.top+r.height/2;
   if(t.clientY<mid&&gi(dragged)>gi(ch[i])){zone.insertBefore(dragged,ch[i]);break}
   if(t.clientY>mid&&gi(dragged)<gi(ch[i])){zone.insertBefore(dragged,ch[i].nextSibling);break}
  }
 }
 function onE(){if(dragged){dragged.classList.remove("dragging");dragged=null}}
 var items=zone.querySelectorAll(".dnd-item");
 for(var i=0;i<items.length;i++){items[i].addEventListener("mousedown",onS);items[i].addEventListener("touchstart",onS,{passive:false})}
 document.addEventListener("mousemove",onM);document.addEventListener("touchmove",onM,{passive:false});
 document.addEventListener("mouseup",onE);document.addEventListener("touchend",onE);
};
window._checkDnD=function(){
 var zone=document.getElementById("dnd-zone"),ch=zone.querySelectorAll(".dnd-item"),correct=["direction","type","sl","resultat","news"];
 var mi=parseInt(zone.getAttribute("data-m"),10);att(mi);var allOk=true;
